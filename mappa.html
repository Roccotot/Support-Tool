<head>

<title>SIGRA FILM — I Nostri Cinema</title>
<meta name="description" content="La mappa dei cinema serviti da Sigra Film in Toscana e dintorni.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<style>
:root {
  --bg:#07090e; --panel:#0c1018; --accent:#2979ff; --amber:#ff9100;
  --text:#d8e8ff; --text2:#7a9bbf; --border:rgba(41,121,255,0.14);
  --rb:linear-gradient(90deg,#e8192c,#1db954,#1565c0);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;display:flex;flex-direction:column}
.rb-bar{height:3px;background:var(--rb);flex-shrink:0;z-index:300}
header{flex-shrink:0;background:rgba(7,9,14,0.97);border-bottom:1px solid var(--border);height:70px;
  display:flex;align-items:center;padding:0 28px;gap:14px;z-index:200}
.logo-wrap{display:flex;align-items:center;gap:14px}
.logo-wrap img{height:40px;width:auto;filter:drop-shadow(0 0 10px rgba(41,121,255,0.5))}
.logo-div{width:1px;height:28px;background:linear-gradient(180deg,transparent,rgba(41,121,255,0.5),transparent)}
.logo-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:#c0d8f0;letter-spacing:2px;line-height:1.8;text-transform:uppercase}
.logo-text b{color:var(--accent)}
.view-toggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-left:auto}
.view-btn{padding:9px 18px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;
  text-transform:uppercase;background:none;border:none;color:#c0d8f0;cursor:pointer;transition:all 0.2s;
  border-right:1px solid var(--border);position:relative}
.view-btn:last-child{border-right:none}
.view-btn:hover{color:#fff;background:rgba(41,121,255,0.07)}
.view-btn.active{background:rgba(41,121,255,0.13);color:#fff}
.view-btn.active::after{content:'';position:absolute;bottom:0;left:6px;right:6px;height:2px;background:var(--rb);border-radius:2px 2px 0 0}
.page-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:3px;text-transform:uppercase;color:#fff;white-space:nowrap}
#map{flex:1;position:relative}
#map.hidden{display:none}
.leaflet-container{background:#07090e !important}
.map-stats-bar{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:500;
  display:flex;gap:12px;align-items:center;background:rgba(7,9,14,0.93);
  border:1px solid var(--border);border-radius:30px;padding:9px 22px;pointer-events:none;
  backdrop-filter:blur(14px);box-shadow:0 4px 20px rgba(0,0,0,0.5);white-space:nowrap}
.msb-item{font-family:'Share Tech Mono',monospace;font-size:11px;color:#c0d8f0;letter-spacing:1px}
.msb-item span{font-weight:700;margin-left:4px;color:var(--accent)}
.msb-sep{color:rgba(255,255,255,0.1)}
.legend{position:absolute;bottom:24px;left:16px;z-index:500;background:rgba(7,9,14,0.93);
  border:1px solid var(--border);border-radius:10px;padding:10px 16px;backdrop-filter:blur(14px);
  font-family:'Share Tech Mono',monospace;font-size:11px;color:#c0d8f0;line-height:2;letter-spacing:1px}
.legend .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:8px;vertical-align:middle;border:2px solid}
.legend .dot.cin{background:rgba(41,121,255,0.25);border-color:var(--accent)}
.legend .dot.est{background:rgba(255,145,0,0.25);border-color:var(--amber)}
.cluster-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;
  background:rgba(41,121,255,0.22);border:2.5px solid var(--accent);box-shadow:0 0 16px rgba(41,121,255,0.5);
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:#fff}
.cmarker{width:38px;height:38px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  border:2.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cmarker-inner{transform:rotate(45deg);display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:14px}
.leaflet-tooltip.cinema-tip{background:rgba(7,9,14,0.95);border:1px solid var(--border);color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:5px;padding:4px 10px;box-shadow:none}
.leaflet-popup-content-wrapper{background:rgba(7,9,14,0.97) !important;border:1px solid rgba(41,121,255,0.3) !important;
  border-radius:13px !important;box-shadow:0 12px 48px rgba(0,0,0,0.8) !important;padding:0 !important;min-width:220px;overflow:hidden}
.leaflet-popup-tip-container{display:none !important}
.leaflet-popup-close-button{color:var(--text2) !important;font-size:18px !important;top:8px !important;right:8px !important}
.leaflet-popup-content{margin:0 !important;width:100% !important}
.popup-rb{height:3px}
.popup-body{padding:13px 16px;display:flex;align-items:flex-start;gap:11px}
.popup-ico{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,0.1)}
.popup-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.popup-city{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;margin-top:3px}
.popup-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.pbadge{font-family:'Share Tech Mono',monospace;font-size:9px;border-radius:3px;padding:2px 7px;border:1px solid;white-space:nowrap}
.load-err{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:600;
  font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text2);text-align:center;padding:20px}
/* ── ELENCO ── */
#list{flex:1;display:none;overflow-y:auto;padding:22px 28px 56px}
#list.active{display:block}
#list::-webkit-scrollbar{width:5px}
#list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.list-inner{max-width:1100px;margin:0 auto}
.list-tools{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.search-input{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:9px 14px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);
  width:280px;max-width:100%;outline:none;transition:all 0.2s}
.search-input::placeholder{color:var(--text2)}
.search-input:focus{border-color:rgba(41,121,255,0.5);box-shadow:0 0 18px rgba(41,121,255,0.2)}
.list-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:1px}
.city-group{margin-bottom:8px}
.city-hdr{display:flex;align-items:center;gap:14px;padding:16px 4px 8px}
.city-hdr-line{flex:1;height:1px;background:var(--border)}
.city-hdr-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);white-space:nowrap}
.city-hdr-count{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);background:rgba(255,255,255,0.06);border-radius:10px;padding:2px 9px;letter-spacing:1px}
.city-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.cinema-row{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--border);
  border-radius:11px;padding:11px 14px;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s}
.cinema-row:hover{border-color:rgba(41,121,255,0.45);box-shadow:0 4px 18px rgba(0,0,0,0.4);transform:translateY(-1px)}
.cr-ico{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(255,255,255,0.1)}
.cr-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;color:#fff;text-transform:uppercase;line-height:1.2;flex:1;min-width:0}
.cr-badges{display:flex;gap:4px;flex-shrink:0}
.no-results{text-align:center;padding:40px 20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);display:none}
@media(max-width:600px){
  header{padding:0 12px;gap:8px}.logo-text,.logo-div{display:none}
  .page-title{display:none}
  .view-btn{padding:8px 13px;font-size:12px}
  .map-stats-bar{top:10px;padding:7px 14px;gap:8px}.msb-item{font-size:10px}
  #list{padding:14px 12px 40px}
  .city-cards{grid-template-columns:1fr}
}
</style>
</head>

<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Estrae da index.html solo nome, città, coordinate e numero sale di ogni
// cinema: nessun IP o dato tecnico arriva su questa pagina.
function extractBlock(src, name){
  const m = src.match(new RegExp('const ' + name + ' = `([^`]*)`'));
  return m ? m[1] : '';
}

function parseCinemas(text, estivo){
  const map = {};
  text.split('\n').forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('//')) return;
    const cols  = line.split('\t');
    const parts = cols[0].split(' - ').map(s => s.trim());
    if (parts.length < 2) return;
    const name = parts[0];
    const city = parts[1].replace(/\s*-\s*[A-Z]{2}$/, '');
    const key  = name + '|' + city;
    if (!map[key]) map[key] = { name, city, estivo, rooms: new Set() };
    if (cols[2] && cols[2].trim() === 'GEO') {
      const [lat, lng] = (cols[1] || '').split(',').map(Number);
      if (!isNaN(lat) && !isNaN(lng)) map[key].coords = [lat, lng];
    } else if (parts.length >= 4 && parts[2] && parts[2] !== 'Rete') {
      map[key].rooms.add(parts[2]);
    }
  });
  return Object.values(map).filter(c => c.coords);
}

let map, _cluster, _markers = {}, _cinemas = [];

function saleBadgeHTML(c, color){
  return c.rooms.size
    ? `<span class="pbadge" style="color:${color};border-color:${color}55">${c.rooms.size} sal${c.rooms.size === 1 ? 'a' : 'e'}</span>` : '';
}

function buildList(){
  const groups = document.getElementById('listGroups');
  const cities = new Map();
  _cinemas.forEach(c => {
    if (!cities.has(c.city)) cities.set(c.city, []);
    cities.get(c.city).push(c);
  });
  let html = '';
  [...cities.keys()].sort((a, b) => a.localeCompare(b, 'it')).forEach(city => {
    const list = cities.get(city).sort((a, b) => a.name.localeCompare(b.name, 'it'));
    html += `<div class="city-group" data-search="${esc(city.toLowerCase())}">
      <div class="city-hdr">
        <div class="city-hdr-line"></div>
        <span class="city-hdr-label">📍 ${esc(city)}</span>
        <span class="city-hdr-count">${list.length} cinema</span>
        <div class="city-hdr-line"></div>
      </div>
      <div class="city-cards">`;
    list.forEach(c => {
      const color = c.estivo ? '#ff9100' : '#2979ff';
      const emoji = c.estivo ? '☀️' : '🎬';
      const estBadge = c.estivo ? '<span class="pbadge" style="color:#ffb74d;border-color:rgba(255,183,77,0.4)">estiva</span>' : '';
      html += `<div class="cinema-row" role="button" tabindex="0" title="Mostra sulla mappa"
          data-key="${esc(c.name + '|' + c.city)}" data-search="${esc((c.name + ' ' + c.city).toLowerCase())}"
          style="background:${color}0d;border-color:${color}33">
        <div class="cr-ico" style="background:${color}20;border-color:${color}55">${emoji}</div>
        <div class="cr-name">${esc(c.name)}</div>
        <div class="cr-badges">${saleBadgeHTML(c, color)}${estBadge}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  groups.innerHTML = html;
  document.getElementById('listCount').textContent =
    _cinemas.length + ' cinema in ' + cities.size + ' città';
  groups.querySelectorAll('.cinema-row').forEach(row => {
    row.addEventListener('click', () => showOnMap(row.dataset.key));
    row.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showOnMap(row.dataset.key); }
    });
  });
}

function showOnMap(key){
  const marker = _markers[key];
  if (!marker) return;
  switchView('map');
  setTimeout(() => {
    map.invalidateSize();
    _cluster.zoomToShowLayer(marker, () => marker.openPopup());
  }, 60);
}

function filterList(q){
  q = q.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.cinema-row[data-search]').forEach(row => {
    const show = !q || row.dataset.search.includes(q);
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.querySelectorAll('.city-group').forEach(g => {
    const any = !!g.querySelector('.cinema-row:not([style*="none"])');
    g.style.display = any ? '' : 'none';
  });
  document.getElementById('noResults').style.display = q && visible === 0 ? '' : 'none';
}

function switchView(v){
  document.getElementById('tab-map').classList.toggle('active', v === 'map');
  document.getElementById('tab-list').classList.toggle('active', v === 'list');
  document.getElementById('map').classList.toggle('hidden', v !== 'map');
  document.getElementById('list').classList.toggle('active', v === 'list');
  if (v === 'map' && map) setTimeout(() => map.invalidateSize(), 60);
}

async function init(){
  let src;
  try {
    const r = await fetch('index.html', { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    src = await r.text();
  } catch (e) {
    document.getElementById('map').insertAdjacentHTML('beforeend',
      '<div class="load-err">Impossibile caricare i dati della mappa.<br>Riprova più tardi.</div>');
    return;
  }

  _cinemas = [
    ...parseCinemas(extractBlock(src, 'RAW'),        false),
    ...parseCinemas(extractBlock(src, 'RAW_NOVPN'),  false),
    ...parseCinemas(extractBlock(src, 'RAW_ESTIVI'), true),
  ];

  document.getElementById('st-cinema').textContent = _cinemas.length;
  document.getElementById('st-citta').textContent  = new Set(_cinemas.map(c => c.city)).size;
  document.getElementById('st-sale').textContent   = _cinemas.reduce((s, c) => s + c.rooms.size, 0);

  map = L.map('map', { center: [43.5, 11.2], zoom: 9, zoomControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Cluster: separa i cinema sovrapposti o molto vicini (es. Nuova Aurora e
  // Cinema sotto le stelle a Sansepolcro hanno le stesse coordinate)
  _cluster = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 42,
    iconCreateFunction: cl => L.divIcon({
      html: `<div class="cluster-icon">${cl.getChildCount()}</div>`,
      className: '', iconSize: [40, 40]
    })
  });

  const bounds = [];
  _cinemas.forEach(c => {
    const color = c.estivo ? '#ff9100' : '#2979ff';
    const emoji = c.estivo ? '☀️' : '🎬';
    const icon = L.divIcon({
      html: `<div class="cmarker" style="background:${color}26;border-color:${color};box-shadow:0 0 14px ${color}66"><div class="cmarker-inner">${emoji}</div></div>`,
      className: '', iconSize: [38, 38], iconAnchor: [19, 38], popupAnchor: [0, -42]
    });
    const marker = L.marker(c.coords, { icon });
    marker.bindTooltip(esc(c.name), { direction: 'top', offset: [0, -40], className: 'cinema-tip' });
    const tipoBadge = c.estivo
      ? '<span class="pbadge" style="color:#ffb74d;border-color:rgba(255,183,77,0.4)">Arena estiva ☀️</span>' : '';
    marker.bindPopup(`
      <div style="background:${color}0d">
        <div class="popup-rb" style="background:${color}"></div>
        <div class="popup-body">
          <div class="popup-ico" style="background:${color}20;border-color:${color}55">${emoji}</div>
          <div>
            <div class="popup-title">${esc(c.name)}</div>
            <div class="popup-city" style="color:${color}">📍 ${esc(c.city)}</div>
            <div class="popup-badges">${saleBadgeHTML(c, color)}${tipoBadge}</div>
          </div>
        </div>
      </div>`, { closeButton: true });
    _markers[c.name + '|' + c.city] = marker;
    _cluster.addLayer(marker);
    bounds.push(c.coords);
  });
  map.addLayer(_cluster);
  if (bounds.length) map.fitBounds(bounds, { padding: [50, 50] });

  buildList();
}
init();
</script>
</body>
</html>
