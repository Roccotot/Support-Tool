<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGRA FILM — NOC Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#07090e; --panel:#0c1018; --panel2:#101520; --panel3:#161d2b;
  --red:#e8192c; --green:#1db954; --blue:#1565c0;
  --accent:#2979ff; --lime:#00e676; --crimson:#ff1744; --amber:#ff9100;
  --text:#d8e8ff; --text2:#3d5470;
  --border:rgba(41,121,255,0.14); --border2:rgba(41,121,255,0.06);
  --glow:0 0 28px rgba(41,121,255,0.3);
  --rb:linear-gradient(90deg,#e8192c,#1db954,#1565c0);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;
  display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(232,25,44,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 100%,rgba(21,101,192,0.06) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(41,121,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(41,121,255,0.022) 1px,transparent 1px);
  background-size:44px 44px}

/* ── RAINBOW BAR ── */
.rb-bar{height:3px;background:var(--rb);flex-shrink:0;position:relative;z-index:300}

/* ── HEADER ── */
header{position:relative;z-index:200;flex-shrink:0;
  background:rgba(7,9,14,0.97);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);height:62px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:14px}
.logo-wrap{display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo-wrap img{height:36px;width:auto;filter:drop-shadow(0 0 10px rgba(41,121,255,0.5))}
.logo-div{width:1px;height:26px;background:linear-gradient(180deg,transparent,rgba(41,121,255,0.5),transparent)}
.logo-text{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);
  letter-spacing:2px;line-height:1.7;text-transform:uppercase}
.logo-text b{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;background:var(--panel);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;margin-right:4px}
.view-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;
  text-transform:uppercase;background:none;border:none;color:var(--text2);cursor:pointer;
  transition:all 0.2s;border-right:1px solid var(--border);position:relative}
.view-btn:last-child{border-right:none}
.view-btn svg{width:14px;height:14px;flex-shrink:0}
.view-btn:hover{color:var(--text);background:rgba(41,121,255,0.06)}
.view-btn.active{background:rgba(41,121,255,0.12);color:#fff}
.view-btn.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;
  height:2px;background:var(--rb);border-radius:2px 2px 0 0}

/* ── VPN PILL ── */
.vpn-pill{display:flex;align-items:center;gap:8px;background:var(--panel);
  border:1px solid var(--border);border-radius:30px;padding:6px 14px 6px 10px;
  cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s;user-select:none}
.vpn-pill:hover{border-color:rgba(41,121,255,0.4);box-shadow:var(--glow)}
.vpn-dot{width:9px;height:9px;border-radius:50%;background:var(--crimson);
  box-shadow:0 0 6px var(--crimson);flex-shrink:0;transition:all 0.4s}
.vpn-dot.on{background:var(--lime);box-shadow:0 0 10px var(--lime);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.vpn-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:1px}
.vpn-status{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:2px;color:var(--crimson);transition:color 0.4s;text-transform:uppercase}
.vpn-status.on{color:var(--lime)}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;position:relative}
.view.active{display:flex;flex-direction:column}
#view-dashboard{overflow-y:auto}
#view-dashboard::-webkit-scrollbar{width:5px}
#view-dashboard::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── STATS STRIP ── */
.stats-strip{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;padding:22px 28px 0;max-width:1600px;margin:0 auto;width:100%}
.stat-tile{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:15px 20px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both;
  transition:border-color 0.2s,box-shadow 0.2s}
.stat-tile:hover{border-color:rgba(41,121,255,0.35);box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-tile:nth-child(1)::before{background:#1565c0}
.stat-tile:nth-child(2)::before{background:#1db954}
.stat-tile:nth-child(3)::before{background:var(--rb)}
.stat-tile:nth-child(1){animation-delay:.05s}.stat-tile:nth-child(2){animation-delay:.1s}
.stat-tile:nth-child(3){animation-delay:.15s}
.st-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text2);margin-bottom:7px}
.st-value{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;
  line-height:1;color:var(--accent)}

/* ── CINEMA GRID ── */
.main{position:relative;z-index:1;padding:18px 28px 32px;max-width:1600px;margin:0 auto;width:100%}
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;
  padding-bottom:10px;border-bottom:1px solid var(--border2)}
.section-title{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;
  color:var(--text2);text-transform:uppercase;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.cinemas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:18px}

/* ── CINEMA CARD ── */
.cinema-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;animation:fadeUp 0.6s ease both;
  transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s}
.cinema-card:hover{border-color:rgba(41,121,255,0.4);
  box-shadow:0 8px 36px rgba(0,0,0,0.5),var(--glow);transform:translateY(-1px)}
.cinema-card:nth-child(1){animation-delay:.04s}.cinema-card:nth-child(2){animation-delay:.08s}
.cinema-card:nth-child(3){animation-delay:.12s}.cinema-card:nth-child(4){animation-delay:.16s}
.cinema-card:nth-child(5){animation-delay:.20s}.cinema-card:nth-child(6){animation-delay:.24s}
.cinema-card:nth-child(7){animation-delay:.28s}
.card-hdr{background:linear-gradient(135deg,var(--panel2),var(--panel3));padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;
  position:relative;overflow:hidden;transition:background 0.2s}
.card-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--rb);opacity:0.55}
.card-title-block{display:flex;align-items:center;gap:11px;position:relative;z-index:1}
.card-icon{width:32px;height:32px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(232,25,44,0.25),rgba(29,185,84,0.15),rgba(21,101,192,0.25));
  border:1px solid rgba(41,121,255,0.2);display:flex;align-items:center;justify-content:center;font-size:15px}
.card-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.card-city{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);
  letter-spacing:1px;margin-top:2px}
.card-meta{display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.tag{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.tag.info{color:var(--accent);border-color:rgba(41,121,255,0.3)}
.chevron{width:15px;height:15px;color:var(--text2);transition:transform 0.3s;flex-shrink:0}
.cinema-card.collapsed .chevron{transform:rotate(-90deg)}
.card-body{overflow:hidden;max-height:1200px;
  transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.cinema-card.collapsed .card-body{max-height:0}
.room-sep{display:flex;align-items:center;gap:9px;padding:7px 16px 4px;margin-top:3px}
.room-sep-line{flex:1;height:1px;background:var(--border2)}
.room-sep-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;
  color:var(--text2);text-transform:uppercase;white-space:nowrap}
.room-sep-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0.4;flex-shrink:0}
.dev-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;
  padding:7px 16px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
.dev-row:last-child{border-bottom:none}
.dev-row:hover{background:rgba(41,121,255,0.04)}
.dev-name{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dev-type{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 6px;
  border-radius:3px;white-space:nowrap;flex-shrink:0}
.dev-type.proj{color:#b39ddb;border:1px solid rgba(179,157,219,0.3)}
.dev-type.srv{color:#90caf9;border:1px solid rgba(144,202,249,0.3)}
.dev-ip{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);
  text-decoration:none;border-bottom:1px dashed rgba(41,121,255,0.3);
  transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.dev-ip:hover{color:#fff;text-shadow:0 0 8px var(--accent)}

/* ── MAP VIEW ── */
#view-map{position:relative}
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:#07090e !important}
.map-stats-bar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:10px;align-items:center;background:rgba(7,9,14,0.92);
  border:1px solid var(--border);border-radius:30px;padding:7px 20px;
  backdrop-filter:blur(14px);pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.msb-item{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px}
.msb-item span{font-weight:700;margin-left:4px;color:var(--accent)}
.msb-sep{color:rgba(255,255,255,0.08)}
.map-legend{position:absolute;bottom:22px;left:14px;z-index:100;background:rgba(7,9,14,0.92);
  border:1px solid var(--border);border-radius:10px;padding:11px 15px;backdrop-filter:blur(14px)}
.legend-title{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text2);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--text);margin-bottom:5px}
.legend-item:last-child{margin-bottom:0}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── MAP MARKER ── */
.cmarker{width:38px;height:38px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cmarker.ok{background:rgba(0,230,118,0.15);border-color:var(--lime);box-shadow:0 0 14px rgba(0,230,118,0.5)}
.cmarker.warn{background:rgba(255,145,0,0.15);border-color:var(--amber);box-shadow:0 0 14px rgba(255,145,0,0.5)}
.cmarker-inner{transform:rotate(45deg);display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;font-size:14px}

/* ── LEAFLET POPUP ── */
.leaflet-popup-content-wrapper{background:rgba(7,9,14,0.97) !important;
  border:1px solid rgba(41,121,255,0.3) !important;border-radius:12px !important;
  box-shadow:0 12px 48px rgba(0,0,0,0.8),0 0 24px rgba(41,121,255,0.15) !important;
  padding:0 !important;min-width:280px;max-width:360px;overflow:hidden}
.leaflet-popup-tip-container{display:none !important}
.leaflet-popup-close-button{color:var(--text2) !important;font-size:17px !important;
  top:9px !important;right:9px !important;z-index:10}
.leaflet-popup-close-button:hover{color:#fff !important}
.leaflet-popup-content{margin:0 !important;width:100% !important}
.popup-rb{height:2px;background:var(--rb)}
.popup-hdr{padding:11px 14px 10px;border-bottom:1px solid rgba(41,121,255,0.1);
  display:flex;align-items:flex-start;gap:10px}
.popup-ico{width:34px;height:34px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(232,25,44,0.2),rgba(21,101,192,0.2));
  border:1px solid rgba(41,121,255,0.25);display:flex;align-items:center;justify-content:center;font-size:15px}
.popup-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.popup-city{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);
  letter-spacing:1px;margin-top:2px}
.popup-addr{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--lime);
  letter-spacing:0.5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.popup-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.pbadge{font-family:'Share Tech Mono',monospace;font-size:8px;border-radius:3px;
  padding:2px 6px;border:1px solid;white-space:nowrap}
.pbadge.info{color:var(--accent);border-color:rgba(41,121,255,0.3)}
.pbadge.ok{color:var(--lime);border-color:rgba(0,230,118,0.4)}
.popup-devs{padding:3px 0;max-height:220px;overflow-y:auto}
.popup-devs::-webkit-scrollbar{width:3px}
.popup-devs::-webkit-scrollbar-thumb{background:rgba(41,121,255,0.2);border-radius:2px}
.popup-dev-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;
  gap:8px;padding:5px 14px;transition:background 0.12s}
.popup-dev-row:hover{background:rgba(41,121,255,0.05)}
.pdev-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdev-type{font-family:'Share Tech Mono',monospace;font-size:8px;padding:1px 5px;
  border-radius:2px;white-space:nowrap;flex-shrink:0}
.pdev-type.proj{color:#b39ddb;border:1px solid rgba(179,157,219,0.3)}
.pdev-type.srv{color:#90caf9;border:1px solid rgba(144,202,249,0.3)}
.pdev-ip{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);
  text-decoration:none;border-bottom:1px dashed rgba(41,121,255,0.3);
  transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.pdev-ip:hover{color:#fff;text-shadow:0 0 7px var(--accent)}
.popup-footer{display:flex;gap:6px;padding:8px 13px;border-top:1px solid rgba(41,121,255,0.1)}
.pfooter-btn{flex:1;text-align:center;text-decoration:none;font-family:'Rajdhani',sans-serif;
  font-weight:600;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 0;border-radius:4px;border:1px solid;transition:all 0.2s}
.pfooter-btn.zb{color:var(--accent);border-color:rgba(41,121,255,0.3)}
.pfooter-btn.zb:hover{background:rgba(41,121,255,0.12);border-color:var(--accent);color:#fff}
.cinema-tooltip .leaflet-tooltip{background:transparent !important;border:none !important;box-shadow:none !important}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--panel2);
  border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;
  padding:11px 17px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text);
  opacity:0;transform:translateX(20px);transition:all 0.3s;pointer-events:none;
  max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.show{opacity:1;transform:translateX(0)}
.toast-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.toast-title.ok{color:var(--lime)} .toast-title.err{color:var(--crimson)} .toast-title.info{color:var(--accent)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid rgba(41,121,255,0.2);
  border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;
  vertical-align:middle;margin-right:4px}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .stats-strip{grid-template-columns:repeat(3,1fr);padding:14px}
  .main{padding:14px 14px 28px}
  .cinemas-grid{grid-template-columns:1fr}
  header{padding:0 14px}
}
@media(max-width:600px){
  .logo-text,.logo-div{display:none}
  header{padding:0 10px}
  .stats-strip{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<div class="rb-bar"></div>

// ── VPN: gateway della rete VPN WireGuard ─────────────────────
// Pinga il gateway VPN (primo IP assegnato dalla VPN),
// NON i singoli dispositivi cinema
const VPN_GATEWAY = 'http://162.19.84.22'; // server Zabbix = gateway VPN raggiungibile
const VPN_FALLBACKS = [
  'http://162.19.84.22/favicon.ico',
  'http://162.19.84.22/index.php'
];
let vpnBusy = false;

function probe(url, ms) {
  return new Promise(res => {
    const c = new AbortController();
    const t = setTimeout(() => { c.abort(); res(false); }, ms);
    fetch(url, { signal: c.signal, mode: 'no-cors', cache: 'no-store' })
      .then(() => { clearTimeout(t); res(true); })
      .catch(() => { clearTimeout(t); res(false); });
  });
}

async function checkVPN() {
  if (vpnBusy) return;
  vpnBusy = true;
  const dot = document.getElementById('vpnDot');
  const st  = document.getElementById('vpnStatus');
  st.innerHTML = '<span class="spinner"></span>...';
  dot.classList.remove('on');

  // Prova il server Zabbix come indicatore VPN attiva
  const ok = await probe(VPN_GATEWAY, 4000) ||
             await probe(VPN_FALLBACKS[0], 3000) ||
             await probe(VPN_FALLBACKS[1], 3000);

  vpnBusy = false;
  dot.classList.toggle('on', ok);
  st.textContent = ok ? 'CONNESSA' : 'OFFLINE';
  st.className = 'vpn-status' + (ok ? ' on' : '');

  // Aggiorna stats bar mappa
  const vpnEl = document.getElementById('msb-vpn');
  if (vpnEl) {
    vpnEl.textContent = ok ? 'ONLINE' : 'OFFLINE';
    vpnEl.style.color = ok ? 'var(--lime)' : 'var(--crimson)';
  }

  showToast(
    ok ? 'VPN ATTIVA' : 'VPN OFFLINE',
    ok ? 'Server Zabbix raggiungibile — rete Sigra Film online.'
       : 'Server non raggiungibile. Controlla WireGuard.',
    ok ? 'ok' : 'err'
  );
}

// ── PARSE RAW ─────────────────────────────────────────────────
function parseRaw(raw) {
  const cinemas = {};
  raw.split('\n').forEach(line => {
    line = line.trim();
    if (!line || !line.includes(':161')) return;
    const cols     = line.split('\t');
    const fullName = cols[0];
    const ip       = (cols[1] || '').replace(':161','');
    const parts    = fullName.split(' - ');
    if (parts.length < 2) return;
    const cinemaName = parts[0].trim();
    const cityRaw    = parts[1].trim();
    // normalizza città (rimuove codici provincia tipo "-SI")
    const city = cityRaw.replace(/\s*-\s*[A-Z]{2}$/,'').trim();
    const room = parts[2] ? parts[2].trim() : 'Dispositivi';
    const dev  = parts.slice(3).join(' - ').trim() || 'Unità';
    const key  = cinemaName + '|||' + city;
    if (!cinemas[key]) cinemas[key] = { name: cinemaName, city, rooms: {} };
    if (!cinemas[key].rooms[room]) cinemas[key].rooms[room] = [];
    cinemas[key].rooms[room].push({ label: dev, ip });
  });
  return Object.values(cinemas).sort((a,b) => a.city.localeCompare(b.city));
}

function devType(label) {
  if (/server|ims|doremi|srv/i.test(label))           return ['srv','SERVER'];
  if (/proiettore|barco|christie|nec|projector/i.test(label)) return ['proj','PROIETT.'];
  return ['proj','UNITÀ'];
}

// ── DASHBOARD ─────────────────────────────────────────────────
function buildDashboard() {
  const cinemas = parseRaw(RAW);
  const grid    = document.getElementById('cinemasGrid');
  grid.innerHTML = '';
  let totalDevs = 0, totalRooms = 0;

  cinemas.forEach(c => {
    const rooms    = Object.entries(c.rooms);
    const devCount = rooms.reduce((s,[,r]) => s+r.length, 0);
    totalDevs  += devCount;
    totalRooms += rooms.length;

    let roomsHTML = '';
    rooms.forEach(([roomName, devices]) => {
      roomsHTML += `<div class="room-sep">
        <div class="room-sep-dot"></div>
        <div class="room-sep-label">${roomName}</div>
        <div class="room-sep-line"></div>
      </div>`;
      devices.forEach(d => {
        const [tc, tl] = devType(d.label);
        roomsHTML += `<div class="dev-row">
          <div class="dev-name" title="${d.label}">${d.label}</div>
          <span class="dev-type ${tc}">${tl}</span>
          <a class="dev-ip" href="http://${d.ip}" target="_blank">${d.ip}</a>
        </div>`;
      });
    });

    const card = document.createElement('div');
    card.className = 'cinema-card';
    card.innerHTML = `
      <div class="card-hdr" onclick="this.closest('.cinema-card').classList.toggle('collapsed')">
        <div class="card-title-block">
          <div class="card-icon">🎬</div>
          <div>
            <div class="card-name">${c.name}</div>
            <div class="card-city">📍 ${c.city}</div>
          </div>
        </div>
        <div class="card-meta">
          <span class="tag info">${devCount} host</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">${roomsHTML}</div>`;
    grid.appendChild(card);
  });

  document.getElementById('statCinema').textContent  = cinemas.length;
  document.getElementById('statDevices').textContent = totalDevs;
  document.getElementById('statRooms').textContent   = totalRooms;
  const now = new Date();
  document.getElementById('lastUpdate').textContent  =
    now.toLocaleDateString('it-IT') + ' ' + now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

// ── MAP ───────────────────────────────────────────────────────
function buildPopupHTML(c, address) {
  const allDevs = Object.values(c.rooms).flat();
  const devCount = allDevs.length;

  let devRows = '';
  Object.entries(c.rooms).forEach(([room, devices]) => {
    devRows += `<div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text2);
      letter-spacing:2px;text-transform:uppercase;padding:5px 14px 2px;border-top:1px solid rgba(41,121,255,0.06)">${room}</div>`;
    devices.forEach(d => {
      const [tc,tl] = devType(d.label);
      devRows += `<div class="popup-dev-row">
        <div class="pdev-name" title="${d.label}">${d.label}</div>
        <span class="pdev-type ${tc}">${tl}</span>
        <a class="pdev-ip" href="http://${d.ip}" target="_blank">${d.ip}</a>
      </div>`;
    });
  });

  const addrLine = address
    ? `<div class="popup-addr">📍 ${address}</div>` : '';

  return `<div class="popup-rb"></div>
    <div class="popup-hdr">
      <div class="popup-ico">🎬</div>
      <div style="flex:1;min-width:0">
        <div class="popup-title">${c.name}</div>
        <div class="popup-city">📍 ${c.city}</div>
        ${addrLine}
        <div class="popup-badges">
          <span class="pbadge ok">✓ ${devCount} host</span>
          <span class="pbadge info">${Object.keys(c.rooms).length} sale</span>
        </div>
      </div>
    </div>
    <div class="popup-devs">${devRows}</div>
    <div class="popup-footer">
      <a class="pfooter-btn zb" href="http://162.19.84.22/zabbix.php?action=host.view" target="_blank">📊 Zabbix</a>
    </div>`;
}

async function geocode(cityName) {
  // Prova prima la città precisa, poi più generica
  const queries = [
    cityName + ', Toscana, Italia',
    cityName + ', Italia'
  ];
  for (const q of queries) {
    try {
      const r = await fetch(
        'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q),
        { headers: { 'Accept-Language': 'it' } }
      );
      const d = await r.json();
      if (d && d[0]) return {
        lat: parseFloat(d[0].lat),
        lng: parseFloat(d[0].lon),
        address: d[0].display_name.split(',').slice(0,3).join(', ')
      };
    } catch(e) {}
  }
  return null;
}

async function buildMap() {
  const map = L.map('map', {
    center: [43.5, 11.2], zoom: 8,
    zoomControl: false, attributionControl: false
  });
  window._map = map;

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Fix tooltip leaflet
  const s = document.createElement('style');
  s.textContent = '.leaflet-tooltip{background:transparent !important;border:none !important;box-shadow:none !important;padding:0 !important}';
  document.head.appendChild(s);

  const cinemas = parseRaw(RAW);
  // Aggiorna stats bar
  document.getElementById('msb-cinema').textContent =
    cinemas.length;
  document.getElementById('msb-host').textContent   =
    cinemas.reduce((s,c)=>s+Object.values(c.rooms).flat().length,0);

  // Geocoding con rate limit Nominatim (1 req/sec)
  for (let i = 0; i < cinemas.length; i++) {
    const c = cinemas[i];
    if (i > 0) await new Promise(r => setTimeout(r, 1150));

    const geo = await geocode(c.city);
    const lat = geo ? geo.lat : 43.5 + (i * 0.15);
    const lng = geo ? geo.lng : 11.0 + (i * 0.1);
    const addr = geo ? geo.address : null;

    const allDevs = Object.values(c.rooms).flat();
    // Marker: verde se ha dispositivi, ambra se è multipla sala
    const markerClass = Object.keys(c.rooms).length > 3 ? 'warn' : 'ok';

    const icon = L.divIcon({
      html: `<div class="cmarker ${markerClass}"><div class="cmarker-inner">🎬</div></div>`,
      className: '', iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-44]
    });

    const marker = L.marker([lat, lng], { icon }).addTo(map);
    const popup  = L.popup({
      closeButton: false, autoClose: false, closeOnClick: false
    }).setContent(buildPopupHTML(c, addr));
    marker.bindPopup(popup);

    // Hover con grace period 300ms
    let closeTimer;
    marker.on('mouseover', () => { clearTimeout(closeTimer); marker.openPopup(); });
    marker.on('mouseout',  () => { closeTimer = setTimeout(() => marker.closePopup(), 300); });
    marker.on('popupopen', () => {
      const el = marker.getPopup().getElement();
      if (!el) return;
      el.addEventListener('mouseenter', () => clearTimeout(closeTimer));
      el.addEventListener('mouseleave', () => {
        closeTimer = setTimeout(() => marker.closePopup(), 300);
      });
    });

    // Tooltip nome cinema permanente
    const col = markerClass === 'ok' ? 'var(--lime)' : 'var(--amber)';
    marker.bindTooltip(
      `<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${col};
        background:rgba(7,9,14,0.94);border:1px solid rgba(41,121,255,0.3);
        padding:3px 9px;border-radius:4px;white-space:nowrap">${c.name}</span>`,
      { permanent: true, direction: 'top', offset: [0,-40], opacity: 1, className: 'cinema-tooltip' }
    );
  }
}

// ── VIEW SWITCHER ─────────────────────────────────────────────
let mapBuilt = false;
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.view-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('tab-' + v).classList.add('active');
  if (v === 'map') {
    if (!mapBuilt) { mapBuilt = true; buildMap(); }
    else if (window._map) setTimeout(() => window._map.invalidateSize(), 50);
  }
}

// ── TOAST ─────────────────────────────────────────────────────
let _tt;
function showToast(title, msg, type) {
  const t  = document.getElementById('toast');
  const tl = document.getElementById('toastTitle');
  tl.textContent = title;
  tl.className = 'toast-title ' + (type || 'info');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 5000);
}

// ── INIT ──────────────────────────────────────────────────────
buildDashboard();
switchView('map');   // apre sulla mappa
setTimeout(checkVPN, 700);
setInterval(checkVPN, 30000);
