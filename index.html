<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGRA FILM — Dashboard Cinema</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060810;
  --panel:#0d1526;
  --panel2:#111d35;
  --accent:#00d4ff;
  --border:rgba(0,212,255,0.15);
  --text:#c8d8f0;
  --text2:#6a8aaa;
  --room-bg: rgba(0, 212, 255, 0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  padding:15px; /* Ridotto per mobile */
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header{
  font-size:20px;
  letter-spacing:2px;
  color:var(--accent);
  margin-bottom:15px;
  text-transform:uppercase;
  font-weight: 700;
  text-align: center;
}

.stats{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.stat-card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:10px;
  border-radius:10px;
  flex:1;
  text-align: center;
}

.stat-label{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:var(--text2);
}

.stat-value{
  font-size:24px;
  font-weight:700;
  color:var(--accent);
}

.cinemas-grid{
  display:grid;
  /* Auto-fit per desktop, 100% per mobile */
  grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
  gap:15px;
  flex: 1;
}

/* Query per schermi più grandi (Tablet/PC) */
@media (min-width: 768px) {
  .cinemas-grid {
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  }
  header { text-align: left; }
}

.cinema-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  height: fit-content;
}

.cinema-header{
  background:var(--panel2);
  padding:10px 15px;
  border-bottom:1px solid var(--border);
}

.cinema-name{
  font-size:14px;
  font-weight:700;
  color:white;
  text-transform: uppercase;
}

.devices{
  padding:5px 12px 12px 12px;
}

.room-divider {
  background: var(--room-bg);
  color: var(--accent);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  margin: 10px -12px 5px -12px;
  border-left: 3px solid var(--accent);
  text-transform: uppercase;
}

.device-row{
  display:flex;
  justify-content:space-between;
  align-items: center;
  padding:5px 0;
  font-size:13px; 
  border-bottom:1px solid rgba(255,255,255,0.05);
  gap: 8px;
}

.device-row:last-child{
  border-bottom:none;
}

.device-info{
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.device-ip{
  font-family:'Share Tech Mono',monospace;
  color:var(--accent);
  text-decoration:none;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(0,212,255,0.08);
  white-space: nowrap;
}

footer {
  margin-top: 30px;
  padding: 15px 0;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text2);
}

footer span {
  color: var(--accent);
}
</style>
</head>
<body>

<div class="stats">

  </div>
  <div class="stat-card">
    <div class="stat-label">DISPOSITIVI</div>
    <div class="stat-value" id="totalDevices">0</div>

</div>

<div class="cinemas-grid" id="cinemasGrid"></div>

<footer>

function buildDashboard(){
  const lines = RAW_ZABBIX_DATA.split("\n");
  let cinemas = {};

  lines.forEach(line=>{
    line=line.trim();
    if(!line || !line.includes(":161")) return;

    const parts = line.split("\t");
    const fullName = parts[0];
    const ip = parts[1].replace(":161","");
    const nameParts = fullName.split(" - ");
    
    if(nameParts.length >= 2) {
      const cinemaRaw = nameParts[0].trim();
      const cityRaw = nameParts[1].trim();
      const cardTitle = `${cityRaw} — ${cinemaRaw}`;
      
      const roomName = nameParts[2] ? nameParts[2].trim() : "Altro";
      const deviceClean = nameParts.slice(3).join(" - ").trim() || "Unit";

      if(!cinemas[cardTitle]) cinemas[cardTitle] = [];
      cinemas[cardTitle].push({ room: roomName, device: deviceClean, ip: ip });
    }
  });

  const grid = document.getElementById("cinemasGrid");
  grid.innerHTML="";
  let totalDevs = 0;

  Object.keys(cinemas).sort().forEach(title => {
    let devicesHTML = "";
    let currentRoom = "";
    
    cinemas[title].forEach(d => {
      totalDevs++;
      if(d.room !== currentRoom){
        devicesHTML += `<div class="room-divider">${d.room}</div>`;
        currentRoom = d.room;
      }
      devicesHTML += `
        <div class="device-row">
          <div class="device-info">${d.device}</div>
          <a class="device-ip" href="http://${d.ip}" target="_blank">${d.ip}</a>
        </div>`;
    });

    grid.innerHTML += `
      <div class="cinema-card">
        <div class="cinema-header"><div class="cinema-name">${title}</div></div>
        <div class="devices">${devicesHTML}</div>
      </div>`;
  });

  document.getElementById("totalCinema").innerText = Object.keys(cinemas).length;
  document.getElementById("totalDevices").innerText = totalDevs;
}

buildDashboard();
