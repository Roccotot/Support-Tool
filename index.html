<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGRA FILM — Support Tool</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#07090e; --panel:#0c1018; --panel2:#101520; --panel3:#161d2b;
  --red:#e8192c; --green:#1db954; --blue:#1565c0;
  --accent:#2979ff; --lime:#00e676; --crimson:#ff1744; --amber:#ff9100;
  --text:#d8e8ff; --text2:#7a9bbf;
  --border:rgba(41,121,255,0.14); --border2:rgba(41,121,255,0.06);
  --glow:0 0 28px rgba(41,121,255,0.3);
  --rb:linear-gradient(90deg,#e8192c,#1db954,#1565c0);
}

  

/* ── TEMA NEGATIVO ── */
html.light { filter:invert(1) hue-rotate(180deg) }
html.light img { filter:invert(1) hue-rotate(180deg) }
html.light .cmarker-inner { filter:invert(1) hue-rotate(180deg) }
html.light .leaflet-tile { filter:invert(1) hue-rotate(180deg) }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(232,25,44,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 100%,rgba(21,101,192,0.06) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(41,121,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(41,121,255,0.022) 1px,transparent 1px);background-size:44px 44px}

.rb-bar{height:3px;background:var(--rb);flex-shrink:0;z-index:300;position:relative}

/* ── HEADER ── */
header{position:relative;z-index:200;flex-shrink:0;background:rgba(7,9,14,0.97);
  backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:70px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:14px}
.logo-wrap{display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo-wrap img{height:40px;width:auto;filter:drop-shadow(0 0 10px rgba(41,121,255,0.5))}
.logo-div{width:1px;height:28px;background:linear-gradient(180deg,transparent,rgba(41,121,255,0.5),transparent)}
.logo-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:#c0d8f0;letter-spacing:2px;line-height:1.8;text-transform:uppercase}
.logo-text b{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}

/* ── VIEW TOGGLE ── */
.theme-toggle{background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px;cursor:pointer;font-size:16px;
  transition:all 0.2s;line-height:1;display:flex;align-items:center}
.theme-toggle:hover{border-color:rgba(41,121,255,0.5);box-shadow:var(--glow)}
.view-toggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.view-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;
  text-transform:uppercase;background:none;border:none;color:#c0d8f0;cursor:pointer;
  transition:all 0.2s;border-right:1px solid var(--border);position:relative}
.view-btn:last-child{border-right:none}
.view-btn svg{width:14px;height:14px;flex-shrink:0}
.view-btn:hover{color:var(--text);background:rgba(41,121,255,0.07)}
.view-btn.active{background:rgba(41,121,255,0.13);color:#fff}
.view-btn.active::after{content:'';position:absolute;bottom:0;left:6px;right:6px;
  height:2px;background:var(--rb);border-radius:2px 2px 0 0}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;position:relative}
.view.active{display:flex;flex-direction:column}
#view-dashboard,#view-bytype{overflow-y:auto}
#view-dashboard::-webkit-scrollbar,#view-bytype::-webkit-scrollbar{width:5px}
#view-dashboard::-webkit-scrollbar-thumb,#view-bytype::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── STATS ── */
.stats-strip{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;padding:22px 28px 0;max-width:1600px;margin:0 auto;width:100%}
.stat-tile{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-tile:nth-child(1)::before{background:#1565c0}
.stat-tile:nth-child(2)::before{background:#1db954}
.stat-tile:nth-child(3)::before{background:var(--rb)}
.stat-tile:nth-child(1){animation-delay:.05s}.stat-tile:nth-child(2){animation-delay:.10s}.stat-tile:nth-child(3){animation-delay:.15s}
.st-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#c0d8f0;margin-bottom:7px}
.st-value{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;line-height:1;color:var(--accent)}

/* ── MAIN ── */
.main{position:relative;z-index:1;padding:20px 28px 56px;max-width:1600px;margin:0 auto;width:100%}
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.section-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:#c0d8f0;text-transform:uppercase;white-space:nowrap}
#lastUpdate{color:#fff !important}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── CINEMA GRID ── */
.cinemas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.city-col{display:flex;flex-direction:column;gap:12px;min-width:0}
.city-col.span-2{grid-column:span 2}
.city-col.span-3{grid-column:span 3}
.city-col .cinema-cards{display:flex;gap:14px;align-items:flex-start}
.city-col .cinema-cards .cinema-card{flex:1;min-width:0}
.city-col-hdr{display:flex;align-items:center;gap:14px;padding:14px 4px 2px}
.city-col-hdr-line{flex:1;height:1px;background:var(--border)}
.city-col-hdr-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);white-space:nowrap}
.city-divider{display:flex;align-items:center;gap:14px;padding:22px 4px 6px;margin-top:4px;grid-column:1/-1}
.grid-filler{visibility:hidden;pointer-events:none}
.city-divider-line{flex:1;height:1px;background:var(--border)}
.city-divider-label{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text2);white-space:nowrap}
.cinema-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;animation:fadeUp 0.6s ease both;transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s}
.cinema-card:hover{border-color:rgba(41,121,255,0.4);box-shadow:0 8px 36px rgba(0,0,0,0.5),var(--glow);transform:translateY(-1px)}
.cinema-card:nth-child(1){animation-delay:.04s}.cinema-card:nth-child(2){animation-delay:.08s}
.cinema-card:nth-child(3){animation-delay:.12s}.cinema-card:nth-child(4){animation-delay:.16s}
.cinema-card:nth-child(5){animation-delay:.20s}.cinema-card:nth-child(6){animation-delay:.24s}
.cinema-card:nth-child(7){animation-delay:.28s}
.card-hdr{background:linear-gradient(135deg,var(--panel2),var(--panel3));padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;position:relative;overflow:hidden}
.card-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rb);opacity:0.55}
.card-title-block{display:flex;align-items:center;gap:11px;position:relative;z-index:1}
.card-icon{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,0.1)}
.card-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.card-city{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;margin-top:2px}
.card-rtr{display:flex;align-items:center;gap:6px;margin-top:5px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:0.5px}
.card-rtr .ping-dot{width:7px;height:7px;flex-shrink:0;cursor:pointer}
@media(min-width:901px){.card-rtr{font-size:12px;margin-top:6px}.card-rtr .ping-dot{width:10px;height:10px}}
.card-actions{display:flex;align-items:center;gap:7px;position:relative;z-index:1}
.tms-btn{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid #00bcd455;color:#00bcd4;text-decoration:none;background:#00bcd410;transition:background .15s}
.tms-btn:hover{background:#00bcd430;color:#00e5ff}
.tag{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);color:#c0d8f0;white-space:nowrap}
.chevron{width:16px;height:16px;color:#c0d8f0;transition:transform 0.3s;flex-shrink:0}
.cinema-card.collapsed .chevron{transform:rotate(-90deg)}
.card-body{overflow:hidden;max-height:2000px;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.cinema-card.collapsed .card-body{max-height:0}

/* ── ROOM SEPARATOR ── */
.room-sep{display:flex;align-items:center;gap:9px;padding:8px 16px 4px;margin-top:3px}
.room-sep-line{flex:1;height:1px;background:var(--border2)}
.room-sep-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:#fff;text-transform:uppercase;white-space:nowrap}
.room-sep-dot{width:5px;height:5px;border-radius:50%;opacity:0.6;flex-shrink:0}

/* ── DEVICE ROW ── */
.dev-row{display:flex;align-items:center;gap:10px;
  padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
.dev-row:last-child{border-bottom:none}
.dev-row:hover{background:rgba(41,121,255,0.04)}

/* ping dot */
.ping-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--text2);cursor:pointer;transition:all 0.3s;
  border:1px solid rgba(255,255,255,0.1)}
.ping-dot:hover{transform:scale(1.3)}
.ping-dot.ok{background:var(--lime);box-shadow:0 0 6px var(--lime);border-color:var(--lime);animation:blinkdot 1.5s infinite}
.ping-dot.err{background:var(--crimson);box-shadow:0 0 6px var(--crimson);border-color:var(--crimson);animation:blinkdot 1.5s infinite}
.ping-dot.checking{background:var(--amber);box-shadow:0 0 6px var(--amber);border-color:var(--amber);animation:blinkdot 0.5s infinite}
@keyframes blinkdot{0%,100%{opacity:1}50%{opacity:0.15}}

.dev-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.dev-type{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.dev-type.proj{color:#b39ddb;border:1px solid rgba(179,157,219,0.3)}
.dev-type.srv{color:#90caf9;border:1px solid rgba(144,202,249,0.3)}
.dev-type.rtr{color:#ffb74d;border:1px solid rgba(255,183,77,0.3)}

/* ── DEVICE BUTTONS ── */
.dev-btns{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ip-btn{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);
  padding:3px 9px;border-radius:3px;border:1px solid rgba(41,121,255,0.3);
  background:rgba(41,121,255,0.07);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.ip-btn:hover{color:#fff;background:rgba(41,121,255,0.2);border-color:var(--accent)}
.ip-btn.copied{color:var(--lime);border-color:rgba(0,230,118,0.4);background:rgba(0,230,118,0.09)}
.proto-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.5px;
  padding:3px 7px;border-radius:3px;border:1px solid;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.proto-btn.web{color:#a5d6a7;border-color:rgba(165,214,167,0.3);background:rgba(165,214,167,0.07)}
.proto-btn.web:hover{background:rgba(165,214,167,0.2);border-color:#a5d6a7;color:#fff}
.proto-btn.ssh{color:#64b5f6;border-color:rgba(100,181,246,0.3);background:rgba(100,181,246,0.07)}
.proto-btn.ssh:hover{background:rgba(100,181,246,0.2);border-color:#64b5f6;color:#fff}
.proto-btn.vnc{color:#ffcc80;border-color:rgba(255,204,128,0.3);background:rgba(255,204,128,0.07)}
.proto-btn.vnc:hover{background:rgba(255,204,128,0.2);border-color:#ffcc80;color:#fff}

/* ── BY TYPE VIEW ── */
.type-section{margin-bottom:30px}
.type-hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.type-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.type-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;text-transform:uppercase}
.type-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:#c0d8f0;letter-spacing:1px;margin-left:auto}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.type-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;animation:fadeUp 0.4s ease both}
.type-card:hover{border-color:rgba(41,121,255,0.4);box-shadow:0 4px 18px rgba(0,0,0,0.4);transform:translateY(-1px)}
.tc-cinema{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;color:#c0d8f0;text-transform:uppercase;margin-bottom:4px}
.tc-name{font-size:12px;color:var(--text);font-weight:600;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-btns{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tc-ping{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text2);
  cursor:pointer;transition:all 0.3s;border:1px solid rgba(255,255,255,0.1);margin-right:2px}
.tc-ping:hover{transform:scale(1.3)}
.tc-ping.ok{background:var(--lime);box-shadow:0 0 5px var(--lime);border-color:var(--lime);animation:blinkdot 1.5s infinite}
.tc-ping.err{background:var(--crimson);box-shadow:0 0 5px var(--crimson);animation:blinkdot 1.5s infinite}
.tc-ping.checking{background:var(--amber);box-shadow:0 0 5px var(--amber);animation:blinkdot 0.5s infinite}

/* ── MAP ── */
#view-map{position:relative}
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:#07090e !important}
.map-stats-bar{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:12px;align-items:center;background:rgba(7,9,14,0.93);
  border:1px solid var(--border);border-radius:30px;padding:9px 22px;
  backdrop-filter:blur(14px);pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.msb-item{font-family:'Share Tech Mono',monospace;font-size:11px;color:#c0d8f0;letter-spacing:1px}
.msb-item span{font-weight:700;margin-left:4px;color:var(--accent)}
.msb-sep{color:rgba(255,255,255,0.1)}
.cmarker{width:40px;height:40px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  border:2.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.cmarker-inner{transform:rotate(45deg);display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:15px}
.cmarker-status{position:absolute;top:-4px;right:-4px;width:13px;height:13px;border-radius:50%;
  background:rgba(122,155,191,0.35);border:2px solid rgba(7,9,14,0.9);
  transform:rotate(45deg);z-index:10;transition:background 0.3s,box-shadow 0.3s}
.cmarker-status.ok{background:#00e676;box-shadow:0 0 7px #00e676;animation:blinkdot 1.5s infinite}
.cmarker-status.err{background:#ff1744;box-shadow:0 0 7px #ff1744;animation:blinkdot 1.5s infinite}
.cmarker-status.partial{background:#ff9100;box-shadow:0 0 7px #ff9100}
.leaflet-popup-content-wrapper{background:rgba(7,9,14,0.97) !important;border:1px solid rgba(41,121,255,0.3) !important;
  border-radius:13px !important;box-shadow:0 12px 48px rgba(0,0,0,0.8),0 0 24px rgba(41,121,255,0.15) !important;
  padding:0 !important;min-width:300px;max-width:380px;overflow:hidden}
.leaflet-popup-tip-container{display:none !important}
.leaflet-popup-close-button{color:var(--text2) !important;font-size:18px !important;top:10px !important;right:10px !important;z-index:10}
.leaflet-popup-close-button:hover{color:#fff !important}
.leaflet-popup-content{margin:0 !important;width:100% !important}
.popup-rb{height:3px}
.popup-hdr{padding:12px 15px 10px;border-bottom:1px solid rgba(41,121,255,0.1);display:flex;align-items:flex-start;gap:11px}
.popup-ico{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,0.1)}
.popup-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.popup-city{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;margin-top:3px}
.popup-addr{font-family:'Share Tech Mono',monospace;font-size:9px;color:#fff;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px}
.popup-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.pbadge{font-family:'Share Tech Mono',monospace;font-size:9px;border-radius:3px;padding:2px 7px;border:1px solid;white-space:nowrap;text-decoration:none;display:inline-block}
.popup-room-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#ffe066;letter-spacing:2px;text-transform:uppercase;padding:6px 15px 3px;border-top:1px solid rgba(41,121,255,0.06);margin-top:2px}
.popup-devs{padding:2px 0;max-height:230px;overflow-y:auto}
.popup-devs::-webkit-scrollbar{width:3px}
.popup-devs::-webkit-scrollbar-thumb{background:rgba(41,121,255,0.2);border-radius:2px}
.popup-dev-row{display:flex;align-items:center;gap:8px;padding:5px 15px;transition:background 0.12s}
.popup-dev-row:hover{background:rgba(41,121,255,0.05)}
.pdev-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.pdev-btns{display:flex;gap:4px;flex-shrink:0}
.cinema-tooltip .leaflet-tooltip{background:transparent !important;border:none !important;box-shadow:none !important}

/* ── CRONOLOGIA ── */
.history-bar{position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(7,9,14,0.96);border-top:1px solid var(--border);
  backdrop-filter:blur(14px);padding:7px 20px;
  display:flex;align-items:center;gap:10px;min-height:40px}
.history-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:#c0d8f0;
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.history-items{display:flex;gap:6px;overflow-x:auto;flex:1}
.history-items::-webkit-scrollbar{display:none}
.hist-item{font-family:'Share Tech Mono',monospace;font-size:10px;color:#fff;
  padding:3px 10px;border-radius:4px;border:1px solid rgba(41,121,255,0.25);
  background:rgba(41,121,255,0.07);white-space:nowrap;cursor:pointer;
  text-decoration:none;transition:all 0.15s;flex-shrink:0;display:inline-flex;align-items:center;gap:5px}
.hist-item:hover{background:rgba(41,121,255,0.2);border-color:var(--accent);color:#fff}
.hist-item-label{font-size:8px;color:rgba(255,255,255,0.6);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-empty{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);font-style:italic}
.history-clear{font-family:'Share Tech Mono',monospace;font-size:9px;color:#c0d8f0;
  padding:3px 8px;border-radius:4px;border:1px solid var(--border2);
  background:none;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.history-clear:hover{color:var(--crimson);border-color:rgba(255,23,68,0.3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:50px;right:20px;z-index:9999;background:var(--panel2);
  border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:9px;
  padding:11px 17px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);
  opacity:0;transform:translateX(20px);transition:all 0.3s;pointer-events:none;
  max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.show{opacity:1;transform:translateX(0)}
.toast-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.toast-title.ok{color:var(--lime)}.toast-title.err{color:var(--crimson)}.toast-title.info{color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:901px){
  .card-name{font-size:22px}
  .card-city{font-size:14px}
  .room-sep-label{font-size:13px;letter-spacing:2.5px}
  .dev-name{font-size:17px}
  .dev-type{font-size:13px;padding:4px 12px}
  .city-divider-label{font-size:20px}
  .tag{font-size:13px;padding:5px 13px}
  .ip-btn{font-size:13px;padding:4px 10px}
  .proto-btn{font-size:12px;padding:4px 10px;letter-spacing:0.5px}
  .dev-btns{gap:6px}
  .dev-row{gap:13px;padding:8px 18px}
  .ping-dot{width:11px;height:11px}
  .chevron{width:20px;height:20px}
  .action-btn{font-size:14px;padding:8px 20px}
  .section-title{font-size:15px;letter-spacing:2px}
  .history-bar{padding:10px 20px}
  .history-label{font-size:13px}
  .hist-item{font-size:13px;padding:5px 12px}
  .hist-item-label{font-size:11px}
  .history-clear{font-size:12px;padding:5px 10px}
  .hist-empty{font-size:12px}
}
@media(max-width:900px){
  .stats-strip{grid-template-columns:repeat(3,1fr);padding:12px}
  .main{padding:12px 12px 56px}
  .cinemas-grid{grid-template-columns:1fr}
  .city-col,.city-col.span-2,.city-col.span-3{grid-column:1/-1}
  .city-col .cinema-cards{flex-direction:column;align-items:stretch}
  .city-col .cinema-cards .cinema-card{flex:none}
  .grid-filler{display:none}
  header{padding:0 12px}
}
/* ── SEARCH ── */
.search-input{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:7px 13px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);
  width:230px;outline:none;transition:all 0.2s}
.search-input::placeholder{color:var(--text2)}
.search-input:focus{border-color:rgba(41,121,255,0.5);box-shadow:var(--glow)}
/* ── GLOBAL STATUS BAR ── */
.global-status-bar{position:relative;z-index:1;display:flex;align-items:center;gap:10px;
  padding:10px 28px 0;max-width:1600px;margin:0 auto;width:100%;flex-wrap:wrap}
.gs-item{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);
  display:inline-flex;align-items:center;gap:5px}
.gs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.gs-dot.ok{background:var(--lime);box-shadow:0 0 4px var(--lime)}
.gs-dot.err{background:var(--crimson);box-shadow:0 0 4px var(--crimson)}
.gs-sep{color:rgba(255,255,255,0.12);font-family:'Share Tech Mono',monospace;font-size:10px}
.gs-spacer{flex:1}
.action-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
  padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:var(--panel);
  color:var(--text);cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.action-btn.refresh:hover{border-color:rgba(41,121,255,0.5);color:#fff;background:rgba(41,121,255,0.1)}
.action-btn.export:hover{border-color:rgba(0,230,118,0.4);color:var(--lime);background:rgba(0,230,118,0.07)}
.action-btn:disabled{opacity:0.5;cursor:not-allowed}
.no-results{grid-column:1/-1;text-align:center;padding:40px 20px;
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);display:none}
@media(max-width:900px){.global-status-bar{padding:8px 12px 0}}
/* ── BOTTONE CICLO VISTE (mobile) ── */
.view-cycle-btn{display:none;align-items:center;gap:6px;padding:9px 13px;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;
  text-transform:uppercase;background:var(--panel);border:1px solid var(--border);
  border-radius:9px;color:#c0d8f0;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.view-cycle-btn:hover{color:#fff;background:rgba(41,121,255,0.09)}
.view-cycle-btn:active{background:rgba(41,121,255,0.18)}
@media(max-width:600px){.logo-text,.logo-div{display:none}.search-input{width:130px}
  .view-toggle{display:none}.view-cycle-btn{display:flex}}
@media(max-width:420px){
  header{padding:0 8px;gap:8px}
  .logo-wrap img{height:30px}
  .search-input{width:80px;padding:6px 8px;font-size:10px}
  .theme-toggle{padding:6px 8px;font-size:14px}
  .view-cycle-btn{padding:6px 9px;font-size:11px;gap:4px}
  .view-cycle-btn svg:last-child{display:none}
}

/* ── TMS ping dots + pulsanti (sezione Cinema) ── */
.tms-ping-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--text2);cursor:pointer;transition:all 0.3s;border:1px solid rgba(255,255,255,0.1)}
.tms-ping-dot:hover{transform:scale(1.3)}
.tms-ping-dot.ok{background:var(--lime);box-shadow:0 0 6px var(--lime);border-color:var(--lime);animation:blinkdot 1.5s infinite}
.tms-ping-dot.err{background:var(--crimson);box-shadow:0 0 6px var(--crimson);border-color:var(--crimson);animation:blinkdot 1.5s infinite}
.tms-ping-dot.checking{background:var(--amber);box-shadow:0 0 6px var(--amber);border-color:var(--amber);animation:blinkdot 0.5s infinite}
.proto-btn.tms-web{color:#4dd0e1;border-color:rgba(77,208,225,0.3);background:rgba(77,208,225,0.07)}
.proto-btn.tms-web:hover{background:rgba(77,208,225,0.2);border-color:#4dd0e1;color:#fff}
.proto-btn.putty{color:#64b5f6;border-color:rgba(100,181,246,0.3);background:rgba(100,181,246,0.07)}
.proto-btn.putty:hover{background:rgba(100,181,246,0.2);border-color:#64b5f6;color:#fff}
.proto-btn.winscp{color:#80cbc4;border-color:rgba(128,203,196,0.3);background:rgba(128,203,196,0.07)}
.proto-btn.winscp:hover{background:rgba(128,203,196,0.2);border-color:#80cbc4;color:#fff}
@media(min-width:901px){.tms-ping-dot{width:11px;height:11px}}

// ── PALETTE ───────────────────────────────────────────────────
// 15 colori distinti e vividi — un colore unico per ogni cinema fino a 15
const PALETTE = [
  '#ff6b6b','#ffa552','#ffd166','#c8f060','#06d6a0',
  '#1db954','#00b4d8','#4cc9f0','#4361ee','#9b5de5',
  '#e040fb','#f72585','#43d9ad','#f9c74f','#ff6090'
];

const _colorMap = {};

function initColors(cinemas) {
  // Reset completo ad ogni init
  Object.keys(_colorMap).forEach(k => delete _colorMap[k]);
  // Assegna in ordine di indice: i primi 15 prendono colori tutti diversi,
  // oltre 15 si ricicla (per forza maggiore)
  cinemas.forEach((c, i) => {
    _colorMap[c.name] = PALETTE[i % PALETTE.length];
  });
}

function cinemaColor(name) {
  return _colorMap[name] || PALETTE[0];
}

// ── PARSE ─────────────────────────────────────────────────────
function parseRaw(raw) {
  const cinemas = {};
  raw.split('\n').forEach(line => {
    line = line.trim();
    if (!line || !line.includes(':161')) return;
    const cols  = line.split('\t');
    const full  = cols[0];
    const ip    = (cols[1]||'').replace(':161','');
    const parts = full.split(' - ');
    if (parts.length < 2) return;
    const name = parts[0].trim();
    const city = parts[1].trim().replace(/\s*-\s*[A-Z]{2}$/,'').trim();
    const room = (parts[2] ? parts[2].trim() : 'Dispositivi').replace(/^(Sala)\s+0*(\d+)$/, '$1 $2');
    const dev  = (parts.slice(3).join(' - ').trim() || 'Unità').replace(/\s+(IMS3000|IMS\s*\d+|Doremi|Barco)\b/gi, '').replace(/\s*-\s*$/, '');
    const key  = name + '|||' + city;
    if (!cinemas[key]) cinemas[key] = { name, city, rooms:{} };
    if (!cinemas[key].rooms[room]) cinemas[key].rooms[room] = [];
    cinemas[key].rooms[room].push({ label:dev, ip });
  });
  const result = Object.values(cinemas).sort((a,b) => a.city.localeCompare(b.city));
  result.forEach(c => Object.keys(c.rooms).forEach(r => {
    c.rooms[r].sort((a,b) => {
      const ta = devType(a.label)[0], tb = devType(b.label)[0];
      return ta === tb ? 0 : ta === 'srv' ? -1 : 1;
    });
  }));
  return result;
}

function devType(label) {
  if (/mikrotik|router/i.test(label))                         return ['rtr','ROUTER'];
  if (/server|ims|doremi|srv/i.test(label))                   return ['srv','SERVER'];
  if (/proiettore|barco|christie|nec|projector/i.test(label)) return ['proj','PROIETT.'];
  return ['proj','UNITÀ'];
}

// ── PING ─────────────────────────────────────────────────────
const pingStatusMap = {};

function updateGlobalStatus() {
  const vals = Object.values(pingStatusMap);
  const online   = vals.filter(s=>s==='ok').length;
  const offline  = vals.filter(s=>s==='err').length;
  const checking = vals.filter(s=>s==='checking').length;
  const total    = parseRaw(RAW).flatMap(c=>Object.values(c.rooms).flatMap(d=>d)).length;
  const unknown  = Math.max(0, total - online - offline - checking);
  const onEl  = document.getElementById('gs-online-count');
  const offEl = document.getElementById('gs-offline-count');
  const unkEl = document.getElementById('gs-unknown-count');
  if(onEl)  onEl.textContent  = online;
  if(offEl) offEl.textContent = offline;
  if(unkEl) unkEl.textContent = unknown;
}

async function pingDevice(ip, dot) {
  const prev = pingStatusMap[ip];
  pingStatusMap[ip] = 'checking';
  updateGlobalStatus();
  // Aggiorna TUTTI i pallini con questo IP (header + body sincronizzati)
  document.querySelectorAll(`[data-ip="${ip}"]`).forEach(d => {
    d.className = d.className.split(' ')
      .filter(c => !['ok','err','checking'].includes(c)).join(' ') + ' checking';
  });
  const ok = await new Promise(res => {
    const c = new AbortController();
    const t = setTimeout(() => { c.abort(); res(false); }, 3000);
    fetch('http://' + ip, { signal:c.signal, mode:'no-cors', cache:'no-store' })
      .then(() => { clearTimeout(t); res(true); })
      .catch(() => { clearTimeout(t); res(false); });
  });
  pingStatusMap[ip] = ok ? 'ok' : 'err';
  updateGlobalStatus();
  document.querySelectorAll(`[data-ip="${ip}"]`).forEach(d => {
    d.className = d.className.split(' ')
      .filter(c => !['checking','ok','err'].includes(c)).join(' ');
    d.classList.add(ok ? 'ok' : 'err');
    d.title = ok ? '✓ Risponde' : '✗ Non risponde';
  });
  if (prev === 'ok' && !ok) showToast('ALERT', ip + ' non risponde', 'err');
}

async function checkTMSBtn(btn) {
  const url = btn.dataset.tmsUrl;
  if (!url) return;
  const ok = await new Promise(res => {
    const c = new AbortController();
    const t = setTimeout(() => { c.abort(); res(false); }, 3000);
    fetch(url, { signal:c.signal, mode:'no-cors', cache:'no-store' })
      .then(() => { clearTimeout(t); res(true); })
      .catch(() => { clearTimeout(t); res(false); });
  });
  if (ok) btn.style.display = '';
}
function checkAllTMSBtns(root) {
  (root || document).querySelectorAll('.tms-btn[data-tms-url]').forEach(checkTMSBtn);
}

function filterDevices(q) {
  q = q.toLowerCase().trim();
  let visibleCinema = 0;
  document.querySelectorAll('.cinema-card[data-search]').forEach(card => {
    const show = !q || card.dataset.search.includes(q);
    card.style.display = show ? '' : 'none';
    if (show) visibleCinema++;
  });
  document.querySelectorAll('.city-col[data-city]').forEach(col => {
    const anyVisible = !!col.querySelector('.cinema-card[data-search]:not([style*="none"])');
    col.style.display = anyVisible || !q ? '' : 'none';
  });
  document.querySelectorAll('.type-card[data-search]').forEach(card => {
    card.style.display = !q || card.dataset.search.includes(q) ? '' : 'none';
  });
  const noRes = document.getElementById('noResults');
  const noResQ = document.getElementById('noResultsQuery');
  if (noRes)  noRes.style.display  = q && visibleCinema === 0 ? '' : 'none';
  if (noResQ) noResQ.textContent   = q;
}

function exportCSV() {
  const cinemas = parseRaw(RAW);
  const rows = [['Cinema','Città','Sala','Dispositivo','IP','Stato']];
  cinemas.forEach(c => {
    Object.entries(c.rooms).forEach(([room, devs]) => {
      devs.forEach(d => {
        rows.push([c.name, c.city, room, d.label, d.ip,
          pingStatusMap[d.ip] || 'non verificato']);
      });
    });
  });
  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'noc-dispositivi.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── AUTO PING ────────────────────────────────────────────────
function cinemaId(name) { return 'ms_' + name.replace(/[^a-zA-Z0-9]/g,'_'); }

function updateMapStatus(cinemaName) {
  const dots = document.querySelectorAll(`.ping-dot[data-cinema="${cinemaName}"]`);
  if (!dots.length) return;
  let ok=0, err=0;
  dots.forEach(d => { if(d.classList.contains('ok')) ok++; else if(d.classList.contains('err')) err++; });
  const el = document.getElementById(cinemaId(cinemaName));
  if (!el) return;
  el.className = 'cmarker-status';
  if (ok+err === 0) return;
  if (err === 0) el.classList.add('ok');
  else if (ok === 0) el.classList.add('err');
  else el.classList.add('partial');
}

async function autoPing() {
  // Deduplica: un solo ping per IP, aggiorna tutti i pallini con quell'IP
  const seen = new Set();
  const dots = [...document.querySelectorAll('[data-ip]')].filter(d => {
    if (seen.has(d.dataset.ip)) return false;
    seen.add(d.dataset.ip);
    return true;
  });
  for (let i = 0; i < dots.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 80));
    const dot = dots[i];
    pingDevice(dot.dataset.ip, dot).then(() => {
      if (dot.dataset.cinema) updateMapStatus(dot.dataset.cinema);
    });
  }
}

// ── COPIA IP ─────────────────────────────────────────────────
function copyIP(ip, el) {
  navigator.clipboard.writeText(ip).then(() => {
    const orig = el.textContent;
    el.classList.add('copied'); el.textContent = '✓ copiato';
    setTimeout(() => { el.classList.remove('copied'); el.textContent = orig; }, 1500);
  }).catch(() => showToast('ERRORE','Copia non disponibile','err'));
}

let histList = [];
try { histList = JSON.parse(localStorage.getItem('noc_hist') || '[]'); } catch(e){}

function addHistory(ip, label) {
  histList = histList.filter(h => h.ip !== ip);
  histList.unshift({ ip, label: label.substring(0,30) });
  if (histList.length > 8) histList = histList.slice(0,8);
  try { localStorage.setItem('noc_hist', JSON.stringify(histList)); } catch(e){}
  renderHistory();
}
function clearHistory() {
  histList = [];
  try { localStorage.removeItem('noc_hist'); } catch(e){}
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyItems');
  if (!histList.length) {
    el.innerHTML = '<span class="hist-empty">Nessun dispositivo visitato</span>';
    return;
  }
  el.innerHTML = histList.map(h =>
    `<a class="hist-item" href="http://${h.ip}" target="_blank"
       onclick="addHistory('${h.ip}','${h.label.replace(/'/g,'')}')">
       <span>${h.ip}</span>
       <span class="hist-item-label">${h.label}</span>
     </a>`
  ).join('');
}

// ── COSTRUISCE PULSANTI DISPOSITIVO ──────────────────────────
function devBtnsHTML(ip, label) {
  const [tc] = devType(label);
  const safe = label.replace(/'/g,'').replace(/"/g,'').substring(0,40);
  const copyBtn = `<button class="ip-btn" onclick="copyIP('${ip}',this)">${ip}</button>`;
  const webBtn  = `<a class="proto-btn web" href="http://${ip}" target="_blank" onclick="addHistory('${ip}','${safe}')" title="Apri interfaccia web">WEB</a>`;
  const sshBtn  = (tc === 'srv' || tc === 'rtr')
    ? `<a class="proto-btn ssh" href="ssh://${ip}" title="SSH">SSH</a>`
    : '';
  const vncBtn  = tc === 'srv'
    ? `<a class="proto-btn vnc" href="vnc://${ip}" title="VNC" onclick="addHistory('${ip}','${safe}')">VNC</a>`
    : '';
  return vncBtn + sshBtn + webBtn + copyBtn;
}

        <div class="room-sep-dot" style="background:${color}"></div>
        <div class="room-sep-label">${roomName}</div>
        <div class="room-sep-line"></div>
      </div>`;
      devices.forEach(d => {
        roomsHTML += `<div class="dev-row">
          <div class="ping-dot" data-ip="${d.ip}" data-cinema="${c.name}" title="Clicca per verificare raggiungibilità"
            onclick="pingDevice('${d.ip}',this)"></div>
          <div class="dev-name" title="${d.label}">${d.label}</div>
          <div class="dev-btns">${devBtnsHTML(d.ip, d.label)}</div>
        </div>`;
      });
    });
    const card = document.createElement('div');
    card.className = 'cinema-card'; // aperta di default
    card.style.cssText = `background:${color}0d;border-color:${color}55`;
    card.innerHTML = `
      <div class="card-hdr" style="background:linear-gradient(135deg,${color}18,${color}10)" onclick="this.closest('.cinema-card').classList.toggle('collapsed')">
        <div class="card-title-block">
          <div class="card-icon" style="background:${color}20;border-color:${color}55">🎬</div>
          <div>
            <div class="card-name">${c.name}</div>
            <div class="card-city" style="color:${color}">📍 ${c.city}</div>
            ${routerDev ? `<div class="card-rtr">
              <div class="ping-dot" data-ip="${routerDev.ip}" data-cinema="${c.name}"
                title="MikroTik — clicca per verificare"
                onclick="event.stopPropagation();pingDevice('${routerDev.ip}',this)"></div>
              <span>MikroTik&ensp;${routerDev.ip}</span>
            </div>` : ''}
          </div>
        </div>
        <div class="card-actions">
          ${tmsIP ? `<a class="tms-btn" href="http://${tmsIP}:9000/tms/" target="_blank" onclick="event.stopPropagation()" title="Apri TMS ${tmsIP}" style="display:none" data-tms-url="http://${tmsIP}:9000/tms/">TMS</a>` : ''}
          <span class="tag" style="color:${color};border-color:${color}44">${devCount} host</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">${roomsHTML}</div>`;
    card.dataset.search = [c.name, c.city,
      ...rooms.flatMap(([rn,devs]) => [rn, ...devs.map(d => d.label+' '+d.ip)])
    ].join(' ').toLowerCase();
    card.dataset.city = c.city;
    return card;
  };

  let colPos = 0;
  cityMap.forEach((cityCinemas, city) => {
    const span = Math.min(cityCinemas.length, 3);
    // Se la città non entra nelle colonne rimanenti → vai a capo
    if (colPos > 0 && colPos + span > 3) {
      for (let i = colPos; i < 3; i++) {
        const f = document.createElement('div');
        f.className = 'city-col grid-filler';
        grid.appendChild(f);
      }
      colPos = 0;
    }
    const col = document.createElement('div');
    col.className = 'city-col' + (span > 1 ? ` span-${span}` : '');
    col.dataset.city = city;
    const hdr = document.createElement('div');
    hdr.className = 'city-col-hdr';
    hdr.innerHTML = `<div class="city-col-hdr-line"></div><span class="city-col-hdr-label">📍 ${city}</span><div class="city-col-hdr-line"></div>`;
    col.appendChild(hdr);
    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'cinema-cards';
    cityCinemas.forEach(c => cardsWrap.appendChild(buildCard(c)));
    col.appendChild(cardsWrap);
    col.dataset.search = cityCinemas.flatMap(c =>
      [c.name, c.city, ...Object.entries(c.rooms).flatMap(([rn,devs]) => [rn, ...devs.map(d => d.label+' '+d.ip)])]
    ).join(' ').toLowerCase();
    grid.appendChild(col);
    colPos = (colPos + span) % 3;
  });
  // Fillers per completare l'ultima riga
  for (let i = colPos; colPos > 0 && i < 3; i++) {
    const f = document.createElement('div');
    f.className = 'city-col grid-filler';
    grid.appendChild(f);
  }

  document.getElementById('statCinema').textContent  = cinemas.length;
  document.getElementById('statDevices').textContent = totalDevs;
  document.getElementById('statRooms').textContent   = totalRooms;
  const now = new Date();
  document.getElementById('lastUpdate').textContent  =
    now.toLocaleDateString('it-IT') + ' ' + now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

// ── PER TIPO ──────────────────────────────────────────────────
function buildByType() {
  const cinemas = parseRaw(RAW);
  initColors(cinemas);
  const gp = document.getElementById('grid-proj');
  const gs = document.getElementById('grid-srv');
  const gr = document.getElementById('grid-rtr');
  gp.innerHTML = ''; gs.innerHTML = ''; gr.innerHTML = '';
  let cp=0, cs=0, cr=0;

  cinemas.forEach(c => {
    const color = cinemaColor(c.name);
    Object.entries(c.rooms).forEach(([room, devices]) => {
      const isRete = room === 'Rete';
      devices.forEach(d => {
        const [tc,tl] = devType(d.label);
        const safe = d.label.replace(/'/g,'').substring(0,40);
        const card = document.createElement('div');
        card.className = 'type-card';
        card.style.cssText = `background:${color}0d;border-color:${color}44`;
        card.innerHTML = `
          <div class="tc-cinema" style="color:${color}">${c.name} — ${c.city}</div>
          <div class="tc-name" title="${room}: ${d.label}">${room}: ${d.label}</div>
          <div class="tc-btns">
            <div class="tc-ping" data-ip="${d.ip}" title="Clicca per verificare"
              onclick="pingDevice('${d.ip}',this)"></div>
            ${devBtnsHTML(d.ip, d.label)}
          </div>`;
        card.dataset.search = [c.name, c.city, room, d.label, d.ip].join(' ').toLowerCase();
        if (isRete) { gr.appendChild(card); cr++; }
        else if (tc === 'srv') { gs.appendChild(card); cs++; }
        else { gp.appendChild(card); cp++; }
      });
    });
  });
  document.getElementById('count-proj').textContent = cp + ' dispositivi';
  document.getElementById('count-srv').textContent  = cs + ' dispositivi';
  document.getElementById('count-rtr').textContent  = cr + ' dispositivi';
}

async function geocodeCinema(name, city) {
  const queries = [`${name} ${city} Italia`,`cinema ${name} ${city}`,`${city}, Italia`,`${city} Italia`];
  for (const q of queries) {
    try {
      const r = await fetch(
        'https://nominatim.openstreetmap.org/search?format=json&limit=3&countrycodes=it&q=' + encodeURIComponent(q),
        { headers:{'Accept-Language':'it','User-Agent':'SigraFilmNOC/3.1'} }
      );
      const d = await r.json();
      if (!d||!d.length) continue;
      const best = d.sort((a,b) => {
        const s = x => /cinema|theatre/i.test((x.type||'')+(x.class||'')) ? 3
          : /building|amenity/i.test(x.class||'') ? 2 : /city|town/i.test(x.type||'') ? 1 : 0;
        return s(b)-s(a);
      })[0];
      return { lat:parseFloat(best.lat), lng:parseFloat(best.lon),
               address:best.display_name.split(',').slice(0,3).join(', ') };
    } catch(e){}
  }
  return null;
}

async function buildMap() {
  const map = L.map('map',{center:[43.5,11.2],zoom:8,zoomControl:false,attributionControl:false});
  window._map = map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  const s = document.createElement('style');
  s.textContent='.leaflet-tooltip{background:transparent !important;border:none !important;box-shadow:none !important;padding:0 !important}';
  document.head.appendChild(s);

  const cinemas = parseRaw(RAW);
  initColors(cinemas);
  document.getElementById('msb-cinema').textContent = cinemas.length;
  document.getElementById('msb-host').textContent   = cinemas.reduce((s,c)=>s+Object.values(c.rooms).flat().length,0);

  const FALLBACK = {
    'Grosseto':[42.7629,11.1121],'Chiusi':[43.0146,11.9454],
    'Montecatini Terme':[43.8847,10.7728],'Pisa':[43.7228,10.4017],
    'Sansepolcro':[43.5693,12.1396],'Massa':[44.0355,10.1398],'Empoli':[43.7193,10.9497],'Firenze':[43.7696,11.2558],
  };

  for (let i=0; i<cinemas.length; i++) {
    const c=cinemas[i], color=cinemaColor(c.name);
    if (i>0) await new Promise(r=>setTimeout(r,1150));
    const geo=await geocodeCinema(c.name,c.city);
    let lat,lng;
    if (geo){lat=geo.lat;lng=geo.lng;c._address=geo.address;}
    else if(FALLBACK[c.city]){[lat,lng]=FALLBACK[c.city];c._address=null;}
    else{lat=43.4+i*0.1;lng=10.9+i*0.12;c._address=null;}

    const icon=L.divIcon({
      html:`<div class="cmarker" style="background:${color}20;border-color:${color};box-shadow:0 0 16px ${color}80"><div class="cmarker-inner">🎬</div><div class="cmarker-status" id="${cinemaId(c.name)}"></div></div>`,
      className:'',iconSize:[40,40],iconAnchor:[20,40],popupAnchor:[0,-46]
    });
    const marker=L.marker([lat,lng],{icon}).addTo(map);
    const popup=L.popup({closeButton:false,autoClose:false,closeOnClick:false}).setContent(buildPopupHTML(c));
    marker.bindPopup(popup);
    let ct;
    marker.on('mouseover',()=>{clearTimeout(ct);marker.openPopup()});
    marker.on('mouseout', ()=>{ct=setTimeout(()=>marker.closePopup(),300)});
    marker.on('popupopen',()=>{
      const el=marker.getPopup().getElement(); if(!el) return;
      el.querySelectorAll('.ping-dot[data-ip]').forEach(dot=>{
        const src=document.querySelector(`.ping-dot[data-cinema][data-ip="${dot.dataset.ip}"]`);
        if(!src) return;
        ['ok','err','checking'].forEach(cls=>dot.classList.toggle(cls,src.classList.contains(cls)));
        dot.title=src.title;
      });
      el.addEventListener('mouseenter',()=>clearTimeout(ct));
      el.addEventListener('mouseleave',()=>{ct=setTimeout(()=>marker.closePopup(),300)});
      checkAllTMSBtns(el);
    });
    marker.bindTooltip(
      `<span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:${color};background:rgba(7,9,14,0.95);border:1px solid ${color}55;padding:4px 11px;border-radius:5px;white-space:nowrap;font-weight:700">${c.name}</span>`,
      {permanent:true,direction:'top',offset:[0,-42],opacity:1,className:'cinema-tooltip'}
    );
    updateMapStatus(c.name);
  }
}

// ── TMS ───────────────────────────────────────────────────────
async function pingTMSDevice(ip, dot) {
  const url = `http://${ip}:9000/tms/`;
  dot.className = dot.className.split(' ')
    .filter(c => !['ok','err','checking'].includes(c)).join(' ') + ' checking';
  const ok = await new Promise(res => {
    const c = new AbortController();
    const t = setTimeout(() => { c.abort(); res(false); }, 3000);
    fetch(url, { signal:c.signal, mode:'no-cors', cache:'no-store' })
      .then(() => { clearTimeout(t); res(true); })
      .catch(() => { clearTimeout(t); res(false); });
  });
  dot.className = dot.className.split(' ')
    .filter(c => !['ok','err','checking'].includes(c)).join(' ');
  dot.classList.add(ok ? 'ok' : 'err');
  dot.title = ok ? `✓ TMS risponde — ${ip}:9000` : `✗ TMS non risponde — ${ip}:9000`;
  // Nascondi riga se offline
  const row = dot.closest('.dev-row[data-tms-row]');
  if (row) row.style.display = ok ? '' : 'none';
  // Aggiorna counter nel tag intestazione
  const online = document.querySelectorAll('.tms-ping-dot.ok').length;
  const tag = document.getElementById('tmsOnlineTag');
  if (tag) tag.textContent = online + ' online';
}

async function autoPingTMS() {
  const dots = [...document.querySelectorAll('.tms-ping-dot[data-tms-ip]')];
  for (let i = 0; i < dots.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 100));
    pingTMSDevice(dots[i].dataset.tmsIp, dots[i]);
  }
}

// ── VIEW SWITCHER ─────────────────────────────────────────────
let mapBuilt=false;
const _VIEWS=['map','dashboard','bytype'];
const _VIEW_LABELS={map:'Mappa',dashboard:'Cinema',bytype:'Per tipo'};

function cycleView(){
  const cur=(document.querySelector('.view.active')||{id:'view-map'}).id.replace('view-','');
  const next=_VIEWS[(_VIEWS.indexOf(cur)+1)%_VIEWS.length];
  switchView(next);
}

function switchView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.view-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('tab-'+v).classList.add('active');
  const lbl=document.getElementById('viewCycleLabel');
  if(lbl) lbl.textContent=_VIEW_LABELS[v]||v;
  if(v==='map'){
    if(!mapBuilt){mapBuilt=true;buildMap();}
    else if(window._map) setTimeout(()=>window._map.invalidateSize(),50);
  }
}

let _tt;
function showToast(title,msg,type){
  const t=document.getElementById('toast'),tl=document.getElementById('toastTitle');
  tl.textContent=title;tl.className='toast-title '+(type||'info');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),4000);
}

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeIcon').textContent = isLight ? '🌙' : '☀️';
  try { localStorage.setItem('noc_theme', isLight ? 'light' : 'dark'); } catch(e){}
}
// Ripristina tema salvato
(function(){
  try {
    if (localStorage.getItem('noc_theme') === 'light') {
      document.documentElement.classList.add('light');
      document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('themeIcon');
        if (el) el.textContent = '🌙';
      });
    }
  } catch(e){}
})();
