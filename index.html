<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGRA FILM — Support Tool</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#07090e; --panel:#0c1018; --panel2:#101520; --panel3:#161d2b;
  --red:#e8192c; --green:#1db954; --blue:#1565c0;
  --accent:#2979ff; --lime:#00e676; --crimson:#ff1744; --amber:#ff9100;
  --text:#d8e8ff; --text2:#7a9bbf;
  --border:rgba(41,121,255,0.14); --border2:rgba(41,121,255,0.06);
  --glow:0 0 28px rgba(41,121,255,0.3);
  --rb:linear-gradient(90deg,#e8192c,#1db954,#1565c0);
}

  

/* ── TEMA NEGATIVO ── */
html.light { filter:invert(1) hue-rotate(180deg) }
html.light img { filter:invert(1) hue-rotate(180deg) }
html.light .cmarker-inner { filter:invert(1) hue-rotate(180deg) }
html.light .leaflet-tile { filter:invert(1) hue-rotate(180deg) }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(232,25,44,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 100%,rgba(21,101,192,0.06) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(41,121,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(41,121,255,0.022) 1px,transparent 1px);background-size:44px 44px}

.rb-bar{height:3px;background:var(--rb);flex-shrink:0;z-index:300;position:relative}

/* ── HEADER ── */
header{position:relative;z-index:200;flex-shrink:0;background:rgba(7,9,14,0.97);
  backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:70px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:14px}
.logo-wrap{display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo-wrap img{height:40px;width:auto;filter:drop-shadow(0 0 10px rgba(41,121,255,0.5))}
.logo-div{width:1px;height:28px;background:linear-gradient(180deg,transparent,rgba(41,121,255,0.5),transparent)}
.logo-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:#c0d8f0;letter-spacing:2px;line-height:1.8;text-transform:uppercase}
.logo-text b{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}

/* ── VIEW TOGGLE ── */
.theme-toggle{background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px;cursor:pointer;font-size:16px;
  transition:all 0.2s;line-height:1;display:flex;align-items:center}
.theme-toggle:hover{border-color:rgba(41,121,255,0.5);box-shadow:var(--glow)}
.view-toggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.view-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;
  text-transform:uppercase;background:none;border:none;color:#c0d8f0;cursor:pointer;
  transition:all 0.2s;border-right:1px solid var(--border);position:relative}
.view-btn:last-child{border-right:none}
.view-btn svg{width:14px;height:14px;flex-shrink:0}
.view-btn:hover{color:var(--text);background:rgba(41,121,255,0.07)}
.view-btn.active{background:rgba(41,121,255,0.13);color:#fff}
.view-btn.active::after{content:'';position:absolute;bottom:0;left:6px;right:6px;
  height:2px;background:var(--rb);border-radius:2px 2px 0 0}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;position:relative}
.view.active{display:flex;flex-direction:column}
#view-dashboard,#view-bytype{overflow-y:auto}
#view-dashboard::-webkit-scrollbar,#view-bytype::-webkit-scrollbar{width:5px}
#view-dashboard::-webkit-scrollbar-thumb,#view-bytype::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── STATS ── */
.stats-strip{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;padding:22px 28px 0;max-width:1600px;margin:0 auto;width:100%}
.stat-tile{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-tile:nth-child(1)::before{background:#1565c0}
.stat-tile:nth-child(2)::before{background:#1db954}
.stat-tile:nth-child(3)::before{background:var(--rb)}
.stat-tile:nth-child(1){animation-delay:.05s}.stat-tile:nth-child(2){animation-delay:.10s}.stat-tile:nth-child(3){animation-delay:.15s}
.st-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#c0d8f0;margin-bottom:7px}
.st-value{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;line-height:1;color:var(--accent)}

/* ── MAIN ── */
.main{position:relative;z-index:1;padding:20px 28px 56px;max-width:1600px;margin:0 auto;width:100%}
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.section-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:#c0d8f0;text-transform:uppercase;white-space:nowrap}
#lastUpdate{color:#fff !important}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── CINEMA GRID ── */
.cinemas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.city-col{display:flex;flex-direction:column;gap:12px;min-width:0}
.city-col.span-2{grid-column:span 2}
.city-col.span-3{grid-column:span 3}
.city-col .cinema-cards{display:flex;gap:14px;align-items:flex-start}
.city-col .cinema-cards .cinema-card{flex:1;min-width:0}
.city-col-hdr{display:flex;align-items:center;gap:14px;padding:14px 4px 2px}
.city-col-hdr-line{flex:1;height:1px;background:var(--border)}
.city-col-hdr-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);white-space:nowrap}
.city-divider{display:flex;align-items:center;gap:14px;padding:22px 4px 6px;margin-top:4px;grid-column:1/-1}
.grid-filler{visibility:hidden;pointer-events:none}
.city-divider-line{flex:1;height:1px;background:var(--border)}
.city-divider-label{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text2);white-space:nowrap}
.cinema-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;animation:fadeUp 0.6s ease both;transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s}
.cinema-card:hover{border-color:rgba(41,121,255,0.4);box-shadow:0 8px 36px rgba(0,0,0,0.5),var(--glow);transform:translateY(-1px)}
.cinema-card:nth-child(1){animation-delay:.04s}.cinema-card:nth-child(2){animation-delay:.08s}
.cinema-card:nth-child(3){animation-delay:.12s}.cinema-card:nth-child(4){animation-delay:.16s}
.cinema-card:nth-child(5){animation-delay:.20s}.cinema-card:nth-child(6){animation-delay:.24s}
.cinema-card:nth-child(7){animation-delay:.28s}
.card-hdr{background:linear-gradient(135deg,var(--panel2),var(--panel3));padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;position:relative;overflow:hidden}
.card-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rb);opacity:0.55}
.card-title-block{display:flex;align-items:center;gap:11px;position:relative;z-index:1}
.card-icon{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,0.1)}
.card-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.card-city{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;margin-top:2px}
.card-rtr{display:flex;align-items:center;gap:6px;margin-top:5px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:0.5px}
.card-rtr .ping-dot{width:7px;height:7px;flex-shrink:0;cursor:pointer}
@media(min-width:901px){.card-rtr{font-size:12px;margin-top:6px}.card-rtr .ping-dot{width:10px;height:10px}}
.card-actions{display:flex;align-items:center;gap:7px;position:relative;z-index:1}
.tms-btn{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid #00bcd455;color:#00bcd4;text-decoration:none;background:#00bcd410;transition:background .15s}
.tms-btn:hover{background:#00bcd430;color:#00e5ff}
.tag{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);color:#c0d8f0;white-space:nowrap}
.chevron{width:16px;height:16px;color:#c0d8f0;transition:transform 0.3s;flex-shrink:0}
.cinema-card.collapsed .chevron{transform:rotate(-90deg)}
.card-body{overflow:hidden;max-height:2000px;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.cinema-card.collapsed .card-body{max-height:0}

/* ── ROOM SEPARATOR ── */
.room-sep{display:flex;align-items:center;gap:9px;padding:8px 16px 4px;margin-top:3px}
.room-sep-line{flex:1;height:1px;background:var(--border2)}
.room-sep-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:#fff;text-transform:uppercase;white-space:nowrap}
.room-sep-dot{width:5px;height:5px;border-radius:50%;opacity:0.6;flex-shrink:0}

/* ── DEVICE ROW ── */
.dev-row{display:flex;align-items:center;gap:10px;
  padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
.dev-row:last-child{border-bottom:none}
.dev-row:hover{background:rgba(41,121,255,0.04)}

/* ping dot */
.ping-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--text2);cursor:pointer;transition:all 0.3s;
  border:1px solid rgba(255,255,255,0.1)}
.ping-dot:hover{transform:scale(1.3)}
.ping-dot.ok{background:var(--lime);box-shadow:0 0 6px var(--lime);border-color:var(--lime);animation:blinkdot 1.5s infinite}
.ping-dot.err{background:var(--crimson);box-shadow:0 0 6px var(--crimson);border-color:var(--crimson);animation:blinkdot 1.5s infinite}
.ping-dot.checking{background:var(--amber);box-shadow:0 0 6px var(--amber);border-color:var(--amber);animation:blinkdot 0.5s infinite}
@keyframes blinkdot{0%,100%{opacity:1}50%{opacity:0.15}}

.dev-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.dev-type{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.dev-type.proj{color:#b39ddb;border:1px solid rgba(179,157,219,0.3)}
.dev-type.srv{color:#90caf9;border:1px solid rgba(144,202,249,0.3)}
.dev-type.rtr{color:#ffb74d;border:1px solid rgba(255,183,77,0.3)}

/* ── DEVICE BUTTONS ── */
.dev-btns{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ip-btn{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);
  padding:3px 9px;border-radius:3px;border:1px solid rgba(41,121,255,0.3);
  background:rgba(41,121,255,0.07);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.ip-btn:hover{color:#fff;background:rgba(41,121,255,0.2);border-color:var(--accent)}
.ip-btn.copied{color:var(--lime);border-color:rgba(0,230,118,0.4);background:rgba(0,230,118,0.09)}
.proto-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.5px;
  padding:3px 7px;border-radius:3px;border:1px solid;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.proto-btn.web{color:#a5d6a7;border-color:rgba(165,214,167,0.3);background:rgba(165,214,167,0.07)}
.proto-btn.web:hover{background:rgba(165,214,167,0.2);border-color:#a5d6a7;color:#fff}
.proto-btn.ssh{color:#64b5f6;border-color:rgba(100,181,246,0.3);background:rgba(100,181,246,0.07)}
.proto-btn.ssh:hover{background:rgba(100,181,246,0.2);border-color:#64b5f6;color:#fff}
.proto-btn.vnc{color:#ffcc80;border-color:rgba(255,204,128,0.3);background:rgba(255,204,128,0.07)}
.proto-btn.vnc:hover{background:rgba(255,204,128,0.2);border-color:#ffcc80;color:#fff}

/* ── BY TYPE VIEW ── */
.type-section{margin-bottom:30px}
.type-hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.type-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.type-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;text-transform:uppercase}
.type-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:#c0d8f0;letter-spacing:1px;margin-left:auto}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.type-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;animation:fadeUp 0.4s ease both}
.type-card:hover{border-color:rgba(41,121,255,0.4);box-shadow:0 4px 18px rgba(0,0,0,0.4);transform:translateY(-1px)}
.tc-cinema{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;color:#c0d8f0;text-transform:uppercase;margin-bottom:4px}
.tc-name{font-size:12px;color:var(--text);font-weight:600;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-btns{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tc-ping{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text2);
  cursor:pointer;transition:all 0.3s;border:1px solid rgba(255,255,255,0.1);margin-right:2px}
.tc-ping:hover{transform:scale(1.3)}
.tc-ping.ok{background:var(--lime);box-shadow:0 0 5px var(--lime);border-color:var(--lime);animation:blinkdot 1.5s infinite}
.tc-ping.err{background:var(--crimson);box-shadow:0 0 5px var(--crimson);animation:blinkdot 1.5s infinite}
.tc-ping.checking{background:var(--amber);box-shadow:0 0 5px var(--amber);animation:blinkdot 0.5s infinite}

/* ── MAP ── */
#view-map{position:relative}
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:#07090e !important}
.map-stats-bar{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:12px;align-items:center;background:rgba(7,9,14,0.93);
  border:1px solid var(--border);border-radius:30px;padding:9px 22px;
  backdrop-filter:blur(14px);pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.msb-item{font-family:'Share Tech Mono',monospace;font-size:11px;color:#c0d8f0;letter-spacing:1px}
.msb-item span{font-weight:700;margin-left:4px;color:var(--accent)}
.msb-sep{color:rgba(255,255,255,0.1)}
.cmarker{width:40px;height:40px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  border:2.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.cmarker-inner{transform:rotate(45deg);display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:15px}
.cmarker-status{position:absolute;top:-4px;right:-4px;width:13px;height:13px;border-radius:50%;
  background:rgba(122,155,191,0.35);border:2px solid rgba(7,9,14,0.9);
  transform:rotate(45deg);z-index:10;transition:background 0.3s,box-shadow 0.3s}
.cmarker-status.ok{background:#00e676;box-shadow:0 0 7px #00e676;animation:blinkdot 1.5s infinite}
.cmarker-status.err{background:#ff1744;box-shadow:0 0 7px #ff1744;animation:blinkdot 1.5s infinite}
.cmarker-status.partial{background:#ff9100;box-shadow:0 0 7px #ff9100}
.leaflet-popup-content-wrapper{background:rgba(7,9,14,0.97) !important;border:1px solid rgba(41,121,255,0.3) !important;
  border-radius:13px !important;box-shadow:0 12px 48px rgba(0,0,0,0.8),0 0 24px rgba(41,121,255,0.15) !important;
  padding:0 !important;min-width:300px;max-width:380px;overflow:hidden}
.leaflet-popup-tip-container{display:none !important}
.leaflet-popup-close-button{color:var(--text2) !important;font-size:18px !important;top:10px !important;right:10px !important;z-index:10}
.leaflet-popup-close-button:hover{color:#fff !important}
.leaflet-popup-content{margin:0 !important;width:100% !important}
.popup-rb{height:3px}
.popup-hdr{padding:12px 15px 10px;border-bottom:1px solid rgba(41,121,255,0.1);display:flex;align-items:flex-start;gap:11px}
.popup-ico{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,0.1)}
.popup-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.2}
.popup-city{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;margin-top:3px}
.popup-addr{font-family:'Share Tech Mono',monospace;font-size:9px;color:#fff;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px}
.popup-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.pbadge{font-family:'Share Tech Mono',monospace;font-size:9px;border-radius:3px;padding:2px 7px;border:1px solid;white-space:nowrap;text-decoration:none;display:inline-block}
.popup-room-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#ffe066;letter-spacing:2px;text-transform:uppercase;padding:6px 15px 3px;border-top:1px solid rgba(41,121,255,0.06);margin-top:2px}
.popup-devs{padding:2px 0;max-height:230px;overflow-y:auto}
.popup-devs::-webkit-scrollbar{width:3px}
.popup-devs::-webkit-scrollbar-thumb{background:rgba(41,121,255,0.2);border-radius:2px}
.popup-dev-row{display:flex;align-items:center;gap:8px;padding:5px 15px;transition:background 0.12s}
.popup-dev-row:hover{background:rgba(41,121,255,0.05)}
.pdev-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.pdev-btns{display:flex;gap:4px;flex-shrink:0}
.cinema-tooltip .leaflet-tooltip{background:transparent !important;border:none !important;box-shadow:none !important}

/* ── CRONOLOGIA ── */
.history-bar{position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(7,9,14,0.96);border-top:1px solid var(--border);
  backdrop-filter:blur(14px);padding:7px 20px;
  display:flex;align-items:center;gap:10px;min-height:40px}
.history-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:#c0d8f0;
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.history-items{display:flex;gap:6px;overflow-x:auto;flex:1}
.history-items::-webkit-scrollbar{display:none}
.hist-item{font-family:'Share Tech Mono',monospace;font-size:10px;color:#fff;
  padding:3px 10px;border-radius:4px;border:1px solid rgba(41,121,255,0.25);
  background:rgba(41,121,255,0.07);white-space:nowrap;cursor:pointer;
  text-decoration:none;transition:all 0.15s;flex-shrink:0;display:inline-flex;align-items:center;gap:5px}
.hist-item:hover{background:rgba(41,121,255,0.2);border-color:var(--accent);color:#fff}
