<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGRA FILM — Dashboard & Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060810;
  --panel:#0d1526;
  --panel2:#111d35;
  --accent:#00d4ff;
  --border:rgba(0,212,255,0.15);
  --text:#c8d8f0;
  --text2:#6a8aaa;
  --room-bg: rgba(0, 212, 255, 0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  padding:15px;
}

header{
  font-size:20px;
  letter-spacing:2px;
  color:var(--accent);
  margin-bottom:15px;
  text-transform:uppercase;
  font-weight: 700;
  text-align: center;
}

/* Container Mappa */
#map {
  height: 350px;
  width: 100%;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 25px;
  background: var(--panel);
  z-index: 1;
}

.stats{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.stat-card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:10px;
  border-radius:10px;
  flex:1;
  text-align: center;
}

.stat-label{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:var(--text2);
}

.stat-value{
  font-size:24px;
  font-weight:700;
  color:var(--accent);
}

.cinemas-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
  gap:15px;
}

@media (min-width: 768px) {
  .cinemas-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
  #map { height: 450px; }
}

.cinema-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  height: fit-content;
}

.cinema-header{
  background:var(--panel2);
  padding:12px 15px;
  border-bottom:1px solid var(--border);
}

.cinema-name{
  font-size:14px;
  font-weight:700;
  color:white;
  text-transform: uppercase;
}

.devices{ padding:5px 12px 12px 12px; }

.room-divider {
  background: var(--room-bg);
  color: var(--accent);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  margin: 10px -12px 5px -12px;
  border-left: 3px solid var(--accent);
  text-transform: uppercase;
}

.device-row{
  display:flex;
  justify-content:space-between;
  align-items: center;
  padding:6px 0;
  font-size:13px; 
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.device-ip{
  font-family:'Share Tech Mono',monospace;
  color:var(--accent);
  text-decoration:none;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(0,212,255,0.08);
}

footer {
  margin-top: 30px;
  padding: 15px 0;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text2);
}

/* Stile Popup Mappa */
.leaflet-popup-content-wrapper {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid var(--accent);
}
.leaflet-popup-tip { background: var(--accent); }
</style>
</head>
<body>

<header>SIGRA FILM — Network Monitor</header>

<div id="map"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">CINEMA</div>
    <div class="stat-value" id="totalCinema">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">DISPOSITIVI</div>
    <div class="stat-value" id="totalDevices">0</div>
  </div>
</div>

<div class="cinemas-grid" id="cinemasGrid"></div>

<footer>
  Creato da: <span>Rocco Totaro</span>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const RAW_ZABBIX_DATA = `
Aurelia Antica - Grosseto - Sala 1 - Proiettore e ICMP	10.57.91.12:161	SNMP	
Abilitato	Ultimi dati 21	1	Grafici	Dashboard	Web
Clev Village - Chiusi -SI - Screen 01 - Proiettore	10.56.70.12:161	SNMP	
Abilitato	Ultimi dati 8	Problemi	Grafici	Dashboard	Web
Imperiale - Montecatini Terme - Sala 1 - Proiettore	10.57.97.12:161	SNMP	
Abilitato	Ultimi dati 15	Problemi	Grafici	Dashboard	Web
Isola Verde - Pisa - Screen 01 - Proiettore	10.58.70.12:161	SNMP	
Abilitato	Ultimi dati 8	Problemi	Grafici	Dashboard	Web
Multisala Odeon - Pisa - Sala 1 Venezia - Proiettore	10.55.76.12:161	SNMP	
Abilitato	Ultimi dati 24	3	Grafici	Dashboard	Web
Nuova Aurora - San Sepolcro - Sala 1 - Proiettore Barco	10.58.78.12:161	SNMP	
Abilitato	Ultimi dati 15	Problemi	Grafici	Dashboard	Web
Splendor - Massa - Screen 01 - Proiettore	10.58.71.12:161	SNMP	
Abilitato	Ultimi dati 8	Problemi	Grafici	Dashboard	Web
`;

// Inizializza Mappa centrata sull'Italia (Toscana)
const map = L.map('map').setView([43.46, 11.12], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

async function getCoordinates(query) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        return data.length > 0 ? [data[0].lat, data[0].lon] : null;
    } catch (e) { return null; }
}

async function buildDashboard(){
  const lines = RAW_ZABBIX_DATA.split("\n");
  let cinemas = {};

  lines.forEach(line=>{
    line=line.trim();
    if(!line || !line.includes(":161")) return;

    const parts = line.split("\t");
    const fullName = parts[0];
    const ip = parts[1].replace(":161","");
    const nameParts = fullName.split(" - ");
    
    if(nameParts.length >= 2) {
      const cinemaRaw = nameParts[0].trim();
      const cityRaw = nameParts[1].trim();
      const cardTitle = `${cityRaw} — ${cinemaRaw}`;
      const roomName = nameParts[2] ? nameParts[2].trim() : "Altro";
      const deviceClean = nameParts.slice(3).join(" - ").trim() || "Unit";

      if(!cinemas[cardTitle]) {
          cinemas[cardTitle] = { details: [], name: cinemaRaw, city: cityRaw };
      }
      cinemas[cardTitle].details.push({ room: roomName, device: deviceClean, ip: ip });
    }
  });

  const grid = document.getElementById("cinemasGrid");
  grid.innerHTML="";
  let totalDevs = 0;

  for (const title of Object.keys(cinemas).sort()) {
    const c = cinemas[title];
    let devicesHTML = "";
    let currentRoom = "";
    
    c.details.forEach(d => {
      totalDevs++;
      if(d.room !== currentRoom){
        devicesHTML += `<div class="room-divider">${d.room}</div>`;
        currentRoom = d.room;
      }
      devicesHTML += `<div class="device-row"><span>${d.device}</span><a class="device-ip" href="http://${d.ip}" target="_blank">${d.ip}</a></div>`;
    });

    grid.innerHTML += `
      <div class="cinema-card" id="card-${c.name.replace(/\s+/g, '')}">
        <div class="cinema-header"><div class="cinema-name">${title}</div></div>
        <div class="devices">${devicesHTML}</div>
      </div>`;

    // Aggiungi Marker sulla Mappa
    const coords = await getCoordinates(`${c.name} ${c.city}`);
    if(coords) {
        L.marker(coords).addTo(map)
         .bindPopup(`<b>${c.name}</b><br>${c.city}<br><small>Dispositivi: ${c.details.length}</small>`);
    }
  }

  document.getElementById("totalCinema").innerText = Object.keys(cinemas).length;
  document.getElementById("totalDevices").innerText = totalDevs;
}

buildDashboard();
</script>
</body>
</html>
