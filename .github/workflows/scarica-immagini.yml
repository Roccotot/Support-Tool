name: Scarica immagini modelli

# Esegue scarica_immagini.py su un runner GitHub (che ha accesso a internet)
# e committa img/ + index.html aggiornato direttamente su main.
# Lancio manuale: tab Actions → "Scarica immagini modelli" → Run workflow.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scarica:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scarica immagini e aggiorna index.html
        run: python3 scarica_immagini.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/ index.html
          if git diff --cached --quiet; then
            echo "Nessuna nuova immagine da committare."
          else
            git commit -m "Immagini modelli scaricate in locale (workflow)"
            git push
          fi
